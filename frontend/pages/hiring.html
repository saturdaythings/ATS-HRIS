<!-- Candidates/Hiring Page Template -->
<div class="page-split active" id="page-hiring" data-page="hiring">
  <!-- Table Section -->
  <div class="page-flex active" style="position:relative;flex:1;">

    <!-- Table Toolbar -->
    <div class="table-toolbar">
      <div class="filter-chip" data-filter="stale">Stale ✕</div>
      <div class="filter-chip" data-filter="stage">Stage ▾</div>
      <div class="filter-chip" data-filter="status">Status ▾</div>
      <div class="filter-chip" data-filter="seniority">Seniority ▾</div>
      <div class="filter-chip" data-filter="source">Source ▾</div>
      <div class="filter-chip" data-filter="client">Client ▾</div>
      <div class="filter-chip" data-filter="skills">Skills ▾</div>
      <div class="filter-chip" data-filter="date">Date added ▾</div>
    </div>

    <!-- Table Wrapper -->
    <div class="tbl-wrap">
      <table id="candidates-table">
        <thead>
          <tr>
            <th data-sort="name">Name ↕</th>
            <th data-sort="role">Role</th>
            <th data-sort="stage">Stage ↕</th>
            <th data-sort="seniority">Seniority</th>
            <th data-sort="source">Source</th>
            <th data-sort="client">Client</th>
            <th data-sort="added">Added ↕</th>
            <th data-sort="activity">Last activity ↕</th>
          </tr>
        </thead>
        <tbody id="candidates-tbody">
          <!-- Rows populated by JS -->
        </tbody>
      </table>
    </div>

  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="hiring-detail-panel" style="display:none;">
    <div class="dp-header">
      <span class="dp-close" onclick="closeDetailPanel()">✕</span>
      <div class="dp-name" id="candidate-name"></div>
      <div class="dp-sub" id="candidate-email"></div>
      <div class="dp-meta" id="candidate-tags"></div>
      <div class="pipeline-row" id="candidate-pipeline"></div>
    </div>

    <div class="dp-tabs">
      <div class="dp-tab active" data-tab="overview">Overview</div>
      <div class="dp-tab" data-tab="interviews">Interviews</div>
      <div class="dp-tab" data-tab="resume">Resume</div>
      <div class="dp-tab" data-tab="notes">Notes</div>
    </div>

    <div class="dp-body">
      <!-- Overview Tab -->
      <div class="tab-content" data-tab="overview">
        <div class="sec-head">About</div>
        <div class="field">
          <div class="field-lbl">Role</div>
          <div class="field-val" id="candidate-role">—</div>
        </div>
        <div class="field">
          <div class="field-lbl">Seniority</div>
          <div class="field-val" id="candidate-seniority">—</div>
        </div>
        <div class="field">
          <div class="field-lbl">Location</div>
          <div class="field-val" id="candidate-location">—</div>
        </div>
        <div class="field">
          <div class="field-lbl">Links</div>
          <div class="tag-row" id="candidate-links"></div>
        </div>

        <div class="sec-head">Source</div>
        <div class="field">
          <div class="field-lbl">Source</div>
          <div class="field-val" id="candidate-source">—</div>
        </div>
        <div class="field">
          <div class="field-lbl">Referrer</div>
          <div class="field-val muted" id="candidate-referrer">—</div>
        </div>
        <div class="field">
          <div class="field-lbl">Date Added</div>
          <div class="field-val" id="candidate-date-added">—</div>
        </div>
      </div>

      <!-- Interviews Tab -->
      <div class="tab-content" data-tab="interviews" style="display:none;">
        <div id="interviews-container">
          <!-- Interview cards will be populated by JS -->
        </div>
      </div>

      <!-- Resume Tab -->
      <div class="tab-content" data-tab="resume" style="display:none;">
        <div id="resume-container">
          <!-- Resume files will be populated by JS -->
        </div>
      </div>

      <!-- Notes Tab -->
      <div class="tab-content" data-tab="notes" style="display:none;">
        <div class="field">
          <div class="field-lbl">Internal Notes</div>
          <textarea class="form-textarea" id="candidate-notes" placeholder="Add notes..."></textarea>
        </div>
      </div>
    </div>

    <div class="dp-actions">
      <button class="btn btn-secondary" id="move-stage-btn">Move Stage</button>
      <button class="btn btn-danger" id="reject-btn">Reject</button>
      <button class="btn btn-primary" id="advance-btn">Advance</button>
    </div>
  </div>

</div>
