<!-- Device Assignments Page Template -->
<div class="page active" id="page-assignments" data-page="assignments">
  <div class="dash-pad">

    <!-- Header -->
    <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <h1 style="font-size:24px;font-weight:500;color:#111;margin-bottom:8px;">Device Assignments</h1>
        <p style="font-size:13px;color:#888;">Track active and historical device assignments</p>
      </div>
      <button class="btn btn-primary" onclick="showAssignmentModal()">+ New Assignment</button>
    </div>

    <!-- Assignment History Grid -->
    <div style="display:grid;grid-template-columns:1fr;gap:12px;">
      <div class="widget">
        <div class="widget-title">Recent assignments</div>
        <table style="width:100%;border-collapse:collapse;">
          <thead>
            <tr style="border-bottom:0.5px solid #e8e8e8;">
              <th style="padding:9px 0;font-size:10.5px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;text-align:left;">Employee</th>
              <th style="padding:9px 0;font-size:10.5px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;text-align:left;">Device</th>
              <th style="padding:9px 0;font-size:10.5px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;text-align:left;">Assigned</th>
              <th style="padding:9px 0;font-size:10.5px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;text-align:left;">Status</th>
            </tr>
          </thead>
          <tbody id="assignments-tbody">
            <!-- Rows populated by JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
