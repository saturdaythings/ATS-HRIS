<!-- Onboarding Page Template -->
<div class="page active" id="page-onboarding" data-page="onboarding">
  <div class="dash-pad">

    <!-- Header -->
    <div style="margin-bottom:24px;">
      <h1 style="font-size:24px;font-weight:500;color:#111;margin-bottom:8px;">Active Onboarding Runs</h1>
      <p style="font-size:13px;color:#888;">Manage and track new hire onboarding progress</p>
    </div>

    <!-- Onboarding Runs List -->
    <div id="onboarding-runs">
      <!-- Run cards will be populated by JS -->
    </div>

  </div>
</div>

<!-- Template for Onboarding Run Card -->
<template id="run-card-template">
  <div class="run-card" data-run-id="">
    <div class="run-header">
      <div>
        <div class="run-name"></div>
        <div class="run-sub"></div>
      </div>
      <button class="btn btn-secondary" style="white-space:nowrap;">View Details</button>
    </div>

    <div class="progress-bg">
      <div class="progress-fill" style="width:0%;"></div>
    </div>

    <div id="tasks-list">
      <!-- Task rows populated by JS -->
    </div>
  </div>
</template>

<!-- Template for Run Task -->
<template id="run-task-template">
  <div class="run-task">
    <span class="task-check-pending">☐</span>
    <span class="task-text"></span>
    <span class="task-owner"></span>
  </div>
</template>
