<!-- Admin: Custom Fields Page Template -->
<div class="page active" id="page-admin-custom-fields" data-page="admin/custom-fields">
  <div class="settings-layout">

    <!-- Navigation -->
    <div class="settings-nav">
      <div class="settings-nav-item active" data-section="fields">Fields</div>
      <div class="settings-nav-item" data-section="options">Options</div>
      <div class="settings-nav-item" data-section="validation">Validation</div>
    </div>

    <!-- Content -->
    <div class="settings-content">
      <h2 class="settings-h">Custom Fields</h2>
      <p class="settings-sub">Define custom fields for all entity types</p>

      <div style="display:flex;gap:12px;margin-bottom:20px;">
        <select class="form-select" id="field-entity-filter" style="flex:1;max-width:200px;">
          <option value="candidate">Candidates</option>
          <option value="employee">Employees</option>
          <option value="device">Devices</option>
        </select>
        <button class="btn btn-primary" onclick="showAddFieldModal()">+ New Field</button>
      </div>

      <div class="list-sidebar">
        <div id="custom-fields-list">
          <!-- Fields populated by JS -->
        </div>
      </div>
    </div>

  </div>
</div>
