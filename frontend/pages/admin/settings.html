<!-- Admin: Settings Page Template -->
<div class="page active" id="page-admin-settings" data-page="admin/settings">
  <div style="padding:24px;max-width:900px;">

    <h2 class="settings-h">System Settings</h2>
    <p class="settings-sub">Configure V.Two Ops system-wide settings and defaults</p>

    <!-- General Settings -->
    <div style="margin-top:28px;">
      <h3 style="font-size:14px;font-weight:500;color:#111;margin-bottom:16px;">General</h3>

      <div class="field">
        <div class="field-lbl">Application Name</div>
        <input type="text" class="form-input" value="V.Two Ops">
      </div>

      <div class="field">
        <div class="field-lbl">Default Timezone</div>
        <select class="form-select">
          <option>America/New_York</option>
          <option>America/Los_Angeles</option>
          <option>Europe/London</option>
          <option>Asia/Tokyo</option>
        </select>
      </div>

      <div class="field">
        <div class="field-lbl">Date Format</div>
        <select class="form-select">
          <option>MM/DD/YYYY</option>
          <option>DD/MM/YYYY</option>
          <option>YYYY-MM-DD</option>
        </select>
      </div>
    </div>

    <!-- Notification Settings -->
    <div style="margin-top:28px;">
      <h3 style="font-size:14px;font-weight:500;color:#111;margin-bottom:16px;">Notifications</h3>

      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" checked>
          <span style="font-size:13px;color:#111;">Email notifications enabled</span>
        </label>
      </div>

      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" checked>
          <span style="font-size:13px;color:#111;">Slack notifications enabled</span>
        </label>
      </div>

      <div class="field">
        <div class="field-lbl">Notification Email</div>
        <input type="email" class="form-input" placeholder="admin@company.com">
      </div>
    </div>

    <!-- Data Management -->
    <div style="margin-top:28px;">
      <h3 style="font-size:14px;font-weight:500;color:#111;margin-bottom:16px;">Data Management</h3>

      <div class="field">
        <button class="btn btn-secondary">Export All Data</button>
        <div class="form-hint" style="margin-top:8px;">Download all system data as JSON/CSV</div>
      </div>

      <div class="field">
        <button class="btn btn-secondary">Database Backup</button>
        <div class="form-hint" style="margin-top:8px;">Create a manual database backup</div>
      </div>

      <div class="field">
        <button class="btn btn-danger">Clear Cache</button>
        <div class="form-hint" style="margin-top:8px;">Clear all application caches</div>
      </div>
    </div>

    <!-- Save Button -->
    <div style="margin-top:28px;">
      <button class="btn btn-primary">Save Settings</button>
    </div>

  </div>
</div>
