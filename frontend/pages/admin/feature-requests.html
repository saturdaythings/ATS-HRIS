<!-- Admin: Feature Requests Page Template -->
<div class="page active" id="page-admin-feature-requests" data-page="admin/feature-requests">
  <div class="dash-pad">

    <!-- Header -->
    <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <h1 style="font-size:24px;font-weight:500;color:#111;margin-bottom:8px;">Feature Requests</h1>
        <p style="font-size:13px;color:#888;">Track and manage feature requests from users</p>
      </div>
      <button class="btn btn-primary" onclick="showNewFeatureRequestModal()">+ New Request</button>
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <div class="filter-chip" data-filter="status">Status ▾</div>
      <div class="filter-chip" data-filter="priority">Priority ▾</div>
      <div class="filter-chip" data-filter="category">Category ▾</div>
    </div>

    <!-- Requests List -->
    <div id="feature-requests-list">
      <!-- Feature requests populated by JS -->
    </div>

  </div>
</div>

<!-- Template for Feature Request Card -->
<template id="feature-request-template">
  <div class="widget" style="margin-bottom:12px;cursor:pointer;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:500;color:#111;margin-bottom:4px;"></div>
        <div style="font-size:12px;color:#777;margin-bottom:8px;"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <span class="badge-blue"></span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:11px;color:#aaa;margin-bottom:6px;">Votes: <strong>0</strong></div>
      </div>
    </div>
  </div>
</template>
