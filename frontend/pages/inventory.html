<!-- Device Inventory Page Template -->
<div class="page-split active" id="page-inventory" data-page="inventory">
  <!-- Table Section -->
  <div class="page-flex active" style="position:relative;flex:1;">

    <!-- Table Toolbar -->
    <div class="table-toolbar">
      <div class="filter-chip" data-filter="status">Status ▾</div>
      <div class="filter-chip" data-filter="type">Type ▾</div>
      <div class="filter-chip" data-filter="model">Model ▾</div>
      <div class="filter-chip" data-filter="location">Location ▾</div>
      <div class="filter-chip" data-filter="purchase">Purchase Date ▾</div>
    </div>

    <!-- Table Wrapper -->
    <div class="tbl-wrap">
      <table id="devices-table">
        <thead>
          <tr>
            <th data-sort="name">Device ↕</th>
            <th data-sort="type">Type</th>
            <th data-sort="model">Model</th>
            <th data-sort="serial">Serial</th>
            <th data-sort="status">Status</th>
            <th data-sort="location">Location</th>
            <th data-sort="purchase">Purchase Date ↕</th>
          </tr>
        </thead>
        <tbody id="devices-tbody">
          <!-- Rows populated by JS -->
        </tbody>
      </table>
    </div>

  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="device-detail-panel" style="display:none;">
    <div class="dp-header">
      <span class="dp-close" onclick="closeDetailPanel()">✕</span>
      <div class="dp-name" id="device-name"></div>
      <div class="dp-sub" id="device-model"></div>
      <div class="dp-meta" id="device-tags"></div>
    </div>

    <div class="dp-tabs">
      <div class="dp-tab active" data-tab="details">Details</div>
      <div class="dp-tab" data-tab="history">History</div>
    </div>

    <div class="dp-body">
      <!-- Details Tab -->
      <div class="tab-content" data-tab="details">
        <div class="sec-head">Device Info</div>
        <div class="field">
          <div class="field-lbl">Type</div>
          <div class="field-val" id="device-type">—</div>
        </div>
        <div class="field">
          <div class="field-lbl">Model</div>
          <div class="field-val" id="device-model-detail">—</div>
        </div>
        <div class="field">
          <div class="field-lbl">Serial Number</div>
          <div class="field-val" id="device-serial">—</div>
        </div>

        <div class="sec-head">Assignment</div>
        <div class="field">
          <div class="field-lbl">Assigned To</div>
          <div class="field-val" id="device-assignee">—</div>
        </div>
        <div class="field">
          <div class="field-lbl">Assignment Date</div>
          <div class="field-val" id="device-assigned-date">—</div>
        </div>

        <div class="sec-head">Lifecycle</div>
        <div class="field">
          <div class="field-lbl">Purchase Date</div>
          <div class="field-val" id="device-purchase-date">—</div>
        </div>
        <div class="field">
          <div class="field-lbl">Status</div>
          <div class="field-val" id="device-status">—</div>
        </div>
      </div>

      <!-- History Tab -->
      <div class="tab-content" data-tab="history" style="display:none;">
        <div id="device-history-container">
          <!-- Assignment history will be populated by JS -->
        </div>
      </div>
    </div>

    <div class="dp-actions">
      <button class="btn btn-secondary" id="reassign-device-btn">Reassign</button>
      <button class="btn btn-danger" id="retire-device-btn">Retire</button>
    </div>
  </div>

</div>
