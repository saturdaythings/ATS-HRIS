<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.Two Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">V2</div>
    <span class="logo-text">V.Two Ops</span>
  </div>
  <div class="nav-section">
    <div class="nav-item active" data-page="dashboard" onclick="nav('dashboard')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      Dashboard
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">People</div>
    <div class="nav-item" data-page="hiring" onclick="nav('hiring')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 13c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
      Hiring
    </div>
    <div class="nav-item" data-page="directory" onclick="nav('directory')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 13v-1.5a3 3 0 00-3-3H5a3 3 0 00-3 3V13"/><circle cx="8" cy="5" r="2.5"/></svg>
      Directory
    </div>
    <div class="nav-item" data-page="onboarding" onclick="nav('onboarding')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 8H3M13 4H3M9 12H3"/></svg>
      Onboarding
    </div>
    <div class="nav-item" data-page="offboarding" onclick="nav('offboarding')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3l3 3-3 3M3 6h10M6 13H3V3h3"/></svg>
      Offboarding
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Devices</div>
    <div class="nav-item" data-page="inventory" onclick="nav('inventory')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="9" rx="1.5"/><path d="M5 12v2M11 12v2M3 14h10"/></svg>
      Inventory
    </div>
    <div class="nav-item" data-page="assignments" onclick="nav('assignments')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V9"/><path d="M10 2l4 4-6 6H4v-4l6-6z"/></svg>
      Assignments
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Admin</div>
    <div class="nav-item" data-page="tracks" onclick="nav('tracks')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h5"/></svg>
      Tracks
    </div>
    <div class="nav-item" data-page="reports" onclick="nav('reports')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l4-4 3 3 5-7"/></svg>
      Reports
    </div>
    <div class="nav-item" data-page="settings" onclick="nav('settings')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.5 1.5M11.5 11.5L13 13M13 3l-1.5 1.5M4.5 11.5L3 13"/></svg>
      Settings
    </div>
  </div>
</nav>
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div style="flex:1"></div>
    <div class="avatar">OL</div>
  </div>
  <div class="page" id="page">
  </div>
</div>
</div>

<div id="modal-root"></div>

<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
<script>
// Initialize the application when DOM is ready
window.addEventListener('DOMContentLoaded', function() {
  const app = new Application();
  app.init();
});
</script>
</body>
</html>
