<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f2f1ed;--border:#e5e3dc;--border2:#d4d2cb;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9e9d98;
  --accent:#5b4ff5;--accent-light:#eeecfe;--accent-text:#3d33c7;
  --green:#1a9c6e;--green-light:#e6f7f1;--amber:#b86c0a;--amber-light:#fef3e2;
  --red:#c0392b;--red-light:#fdecea;--blue:#1a6fb5;--blue-light:#e8f2fc;
  --sidebar-w:220px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --radius:8px;--radius-lg:12px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--font)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:0 0 16px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;min-height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.page{flex:1;overflow-y:auto;padding:28px 28px 40px}
.sidebar-logo{padding:18px 16px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px}
.logo-text{font-weight:600;font-size:14px}
.nav-section{padding:0 8px;margin-bottom:4px}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;transition:all .12s}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent-text);font-weight:500}
.nav-icon{width:16px;height:16px;opacity:.7;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.topbar-title{font-weight:500;font-size:14px;flex:1}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-light);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;border:none}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4a3ee0}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--bg)}
.btn-ghost{background:none;color:var(--text2);padding:6px 10px}.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red-light);color:var(--red)}.btn-danger:hover{background:#f9d8d5}
.btn-link{background:none;color:var(--accent);padding:0;font-size:13px;text-decoration:underline;cursor:pointer}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:20px;font-weight:600;letter-spacing:-.4px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px}
.stat-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:600;letter-spacing:-.8px;line-height:1}
.stat-sub{font-size:12px;color:var(--text3);margin-top:4px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.table-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;flex:1;max-width:280px}
.table-search input{background:none;border:none;outline:none;font-size:13px;color:var(--text);width:100%}
.table-search input::placeholder{color:var(--text3)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg)}
td{padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px}

tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--bg)}
tr.selected td{background:var(--accent-light)}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:500}
.pill-green{background:var(--green-light);color:var(--green)}
.pill-amber{background:var(--amber-light);color:var(--amber)}
.pill-red{background:var(--red-light);color:var(--red)}
.pill-blue{background:var(--blue-light);color:var(--blue)}
.pill-purple{background:var(--accent-light);color:var(--accent-text)}
.pill-gray{background:var(--surface2);color:var(--text2)}

.person-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.person-name{font-weight:500}
.person-sub{font-size:12px;color:var(--text2)}
.split-layout{display:flex;gap:0;overflow:hidden}
.split-list{flex:1;overflow-y:auto}
.split-detail{width:400px;min-width:400px;border-left:1px solid var(--border);overflow-y:auto;background:var(--surface);display:none;flex-direction:column}
.split-detail.open{display:flex}
.detail-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.detail-close{width:28px;height:28px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;line-height:1}
.detail-close:hover{background:var(--bg)}
.detail-body{padding:20px;overflow-y:auto;flex:1}
.detail-section{margin-bottom:20px}
.detail-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:12px;color:var(--text2)}
.detail-val{font-size:13px;font-weight:500;text-align:right}
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kanban-col{min-width:210px;max-width:210px;background:var(--bg);border-radius:var(--radius-lg);padding:12px;display:flex;flex-direction:column;gap:8px}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.kanban-col-name{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.4px;text-transform:uppercase}
.kanban-count{background:var(--border);color:var(--text2);border-radius:100px;font-size:11px;font-weight:600;padding:1px 7px}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all .12s}
.kanban-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(91,79,245,.1)}
.kanban-card.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.kanban-name{font-weight:500;font-size:13px;margin-bottom:2px}
.kanban-role{font-size:12px;color:var(--text2)}
.kanban-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:4px;flex-wrap:wrap}
.run-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color .12s}

.run-progress-fill{height:100%;background:var(--accent);border-radius:100px}

.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:12px;padding-bottom:16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center;width:20px;flex-shrink:0}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:4px;flex-shrink:0}
.tl-line{flex:1;width:1px;background:var(--border);margin-top:4px}
.tl-item:last-child .tl-line{display:none}
.tl-desc{font-size:13px;font-weight:500}
.tl-time{font-size:11px;color:var(--text3);margin-top:2px}
.device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.device-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:border-color .12s}
.device-card:hover{border-color:var(--accent)}
.device-icon{font-size:24px;margin-bottom:10px}
.device-name{font-weight:600;font-size:14px;margin-bottom:2px}
.device-serial{font-size:11px;color:var(--text3);font-family:var(--mono)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent-text);border-bottom-color:var(--accent)}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;transition:border-color .12s}
.form-input:focus{border-color:var(--accent)}
.form-select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b6a65' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:640px}
.modal-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-weight:600;font-size:16px}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;z-index:200;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty-state{padding:40px 20px;text-align:center}
.empty-title{font-weight:500;font-size:14px;margin-bottom:4px}
.empty-sub{font-size:12px;color:var(--text3)}
.interview-card{background:var(--bg);border-radius:var(--radius);padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.interview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.score-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>

const emp=id=>employees.find(e=>e.id===id)||{name:'Unknown'};

function stagePill(s){
  const m={sourced:'gray',screening:'blue',interview:'amber',offer:'purple',hired:'green'};
  return`<span class="pill pill-${m[s]||'gray'}">${s}</span>`;
}
function candStatusPill(s){
  const m={'Active':'green','On Hold':'amber','Nurturing':'blue','Closed':'red'};
  return`<span class="pill pill-${m[s]||'gray'}">${s}</span>`;
}
function statusPill(s){
  if(['active','good','new','available'].includes(s))return`<span class="pill pill-green">${s}</span>`;
  if(s==='onboarding')return`<span class="pill pill-blue">onboarding</span>`;
  if(s==='assigned')return`<span class="pill pill-purple">assigned</span>`;
  if(s==='pending')return`<span class="pill pill-amber">pending</span>`;
  return`<span class="pill pill-gray">${s}</span>`;
}
function personCell(name,sub=''){
  return`<div class="person-cell"><div class="person-av" style="${av(name)}">${initials(name)}</div><div><div class="person-name">${name}</div>${sub?`<div class="person-sub">${sub}</div>`:''}</div></div>`;
}
function scoreDisplay(score){
  if(!score)return'<span style="color:var(--text3);font-size:12px">—</span>';
  return`<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px"><span class="score-dot" style="background:${SCORE_COLORS[score]}"></span>${SCORE_LABELS[score]}</span>`;
}
function compDisplay(c){
  if(!c.compAmount)return'—';
  if(c.compType==='hourly')return`$${c.compAmount.toLocaleString()}/hr`;
  return`$${c.compAmount.toLocaleString()}/yr`;
}
function touch(c){c.updatedAt=now();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;}
function renderEmpty(title,sub){return`<div class="empty-state"><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">
        <div style="font-weight:600;font-size:13px;margin-bottom:14px">Candidate Pipeline Status</div>
        ${CAND_STATUS.map(s=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="nav('hiring')">
            <span>${candStatusPill(s)}</span>
            <span style="font-weight:600;font-size:14px">${statusGroups[s]}</span>

      </div>

        ${withInterviews.length?withInterviews.map(c=>{

          return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="nav('hiring')">

      </div>
    </div>
    <div class="card">
      <div style="font-weight:600;font-size:13px;margin-bottom:14px">Recent Activity</div>

        ${activities.slice(0,5).map((a,i)=>`

let kanbanFilter='';
function filterKanbanStatus(v){kanbanFilter=v;renderKanban(v?candidates.filter(c=>c.candStatus===v):candidates);}

function renderKanban(list){
  const k=document.getElementById('kanban');
  if(!k)return;
  k.innerHTML=STAGES.map(stage=>{
    const cols=(list||candidates).filter(c=>c.stage===stage);
    return`<div class="kanban-col">
      <div class="kanban-col-header"><span class="kanban-col-name">${stage}</span><span class="kanban-count">${cols.length}</span></div>
      ${cols.map(c=>`
        <div class="kanban-card${selectedCandId===c.id?' selected':''}" onclick="selectCandidate('${c.id}')">
          <div class="kanban-name">${c.name}</div>
          <div class="kanban-role">${c.role}</div>
          <div class="kanban-meta">
            ${candStatusPill(c.candStatus)}
            ${c.interviews.length?`<span style="font-size:11px;color:var(--text3)">${c.interviews.length} interview${c.interviews.length>1?'s':''}</span>`:''}
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:6px">${relTime(c.updatedAt)}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

function selectCandidate(id){
  selectedCandId=id;
  renderKanban(kanbanFilter?candidates.filter(c=>c.candStatus===kanbanFilter):candidates);
  renderCandidateDetail(id);
}

function renderInterviewsList(c){
  if(!c.interviews.length)return`<div style="font-size:12px;color:var(--text3);padding:8px 0">No interviews logged yet</div>`;
  return c.interviews.map((iv,i)=>`
    <div class="interview-card">
      <div class="interview-header">
        <div>
          <div style="font-weight:500;font-size:13px">${iv.date}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:1px">${iv.interviewers||'No interviewers listed'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${scoreDisplay(iv.score)}
          <button class="btn-ghost btn-sm" style="color:var(--red);padding:4px 6px" onclick="deleteInterview('${c.id}',${i})">✕</button>
        </div>
      </div>
      ${iv.notes?`<p style="font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5">${iv.notes}</p>`:''}
    </div>`).join('');
}

function deleteInterview(candId,idx){
  const c=candidates.find(x=>x.id===candId);
  c.interviews.splice(idx,1);
  touch(c);
  renderCandidateDetail(candId);
  showToast('Interview removed');
}

function moveStage(id,stage){
  const c=candidates.find(x=>x.id===id);
  if(c){c.stage=stage;touch(c);showToast(`${c.name} → ${stage}`);}
  activities.unshift({id:'ac'+Date.now(),type:'stage',desc:`${c.name} moved to ${stage}`,at:now()});
  renderCandidateDetail(id);
  renderKanban(kanbanFilter?candidates.filter(x=>x.candStatus===kanbanFilter):candidates);
}

function closeCandDetail(){
  selectedCandId=null;
  const d=document.getElementById('candidate-detail');
  if(d)d.classList.remove('open');
  renderKanban(kanbanFilter?candidates.filter(c=>c.candStatus===kanbanFilter):candidates);
}

function showAddInterviewModal(candId){
  const c=candidates.find(x=>x.id===candId);

function addInterview(candId){
  const date=document.getElementById('iv-date').value;

function renderOnboarding(){
  const p=document.getElementById('page');
  const active=onboardingRuns.filter(r=>r.type==='onboarding');
  p.innerHTML=`
    <div class="page-header"><div><div class="page-title">Onboarding</div><div class="page-subtitle">${active.length} run${active.length!==1?'s':''} in progress</div></div><button class="btn btn-primary" onclick="showToast('Start onboarding run')">+ Start Run</button></div>
    ${active.length?active.map(run=>{
      const e=emp(run.employeeId);
      const done=run.tasks.filter(t=>t.status==='completed').length;
      const pct=Math.round(done/run.tasks.length*100);
      return`<div class="run-card" onclick="openRunDetail('${run.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div>${personCell(e.name,`Starts ${run.startDate}`)}</div>
          <div style="text-align:right"><div style="font-size:12px;font-weight:600;color:var(--accent)">${pct}%</div><div style="font-size:11px;color:var(--text3)">${done}/${run.tasks.length}</div></div>
        </div>
        <div class="run-progress-wrap"><div class="run-progress-fill" style="width:${pct}%"></div></div>
        <div style="display:flex;flex-direction:column;gap:5px">
          ${run.tasks.slice(0,4).map(t=>`<div class="run-task"><div class="task-check${t.status==='completed'?' done':''}">${t.status==='completed'?'✓':''}</div><span>${t.name}</span><span style="margin-left:auto;font-size:11px;color:var(--text3)">${t.dueDate}</span></div>`).join('')}
        </div>
      </div>`;
    }).join(''):renderEmpty('No onboarding runs','Start a run when a new hire is confirmed')}
  `;
}

function openRunDetail(id){
  const run=onboardingRuns.find(r=>r.id===id);
  const e=emp(run.employeeId);
  const done=run.tasks.filter(t=>t.status==='completed').length;
  showModal(`
    <div class="modal" style="max-width:540px">
      <div class="modal-header"><div class="modal-title">${e.name} — Onboarding</div><button class="detail-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Start: ${run.startDate} · ${done}/${run.tasks.length} complete</p>
        ${run.tasks.map(t=>`
          <div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer" onclick="toggleTask('${run.id}','${t.id}')">
            <div class="task-check${t.status==='completed'?' done':''}">${t.status==='completed'?'✓':''}</div>
            <div style="flex:1"><div style="font-size:13px;font-weight:${t.status==='completed'?'400':'500'};text-decoration:${t.status==='completed'?'line-through':''};color:${t.status==='completed'?'var(--text3)':'var(--text)'}">${t.name}</div><div style="font-size:11px;color:var(--text3)">${t.ownerRole} · Due ${t.dueDate}</div></div>
            ${statusPill(t.status)}
          </div>`).join('')}
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
    </div>
  `);
}

function toggleTask(runId,taskId){
  const run=onboardingRuns.find(r=>r.id===runId);
  const task=run.tasks.find(t=>t.id===taskId);
  if(task){task.status=task.status==='completed'?'pending':'completed';showToast(task.status==='completed'?'Task complete':'Reopened');}
  openRunDetail(runId);renderOnboarding();
}

  showModal(`
    <div class="modal">
      <div class="modal-header"><div class="modal-title">Assign ${d.name}</div><button class="detail-close" onclick="closeModal()">×</button></div>
      <div class="modal-body"><div class="form-group"><label class="form-label">Employee</label><select class="form-input form-select" id="ae">${employees.map(e=>`<option value="${e.id}">${e.name} — ${e.role}</option>`).join('')}</select></div></div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="assignDev('${devId}')">Assign</button></div>
    </div>`);
}

function assignDev(devId){
  const empId=document.getElementById('ae').value;
  const d=devices.find(x=>x.id===devId);const e=employees.find(x=>x.id===empId);
  d.status='assigned';d.assignedTo=empId;
  assignments.push({id:'a'+Date.now(),employeeId:empId,deviceId:devId,assignedAt:now(),status:'active'});
  activities.unshift({id:'ac'+Date.now(),type:'device',desc:`${d.name} assigned to ${e.name}`,at:now()});
  closeModal();showToast(`${d.name} assigned to ${e.name}`);renderInventory();
}

function returnDevice(devId){
  const d=devices.find(x=>x.id===devId);
  d.status='available';d.assignedTo=null;
  const i=assignments.findIndex(a=>a.deviceId===devId&&a.status==='active');
  if(i>=0)assignments.splice(i,1);
  closeModal();showToast(`${d.name} returned`);renderInventory();
}

function showAddDeviceModal(){
  showModal(`
    <div class="modal">
      <div class="modal-header"><div class="modal-title">Add Device</div><button class="detail-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="form-row"><div class="form-group"><label class="form-label">Make</label><input class="form-input" id="dmk" placeholder="Apple"/></div><div class="form-group"><label class="form-label">Model</label><input class="form-input" id="dml" placeholder='MacBook Pro 14"'/></div></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Type</label><select class="form-input form-select" id="dtp"><option value="laptop">Laptop</option><option value="monitor">Monitor</option><option value="phone">Phone</option><option value="keyboard">Keyboard</option></select></div>
          <div class="form-group"><label class="form-label">Serial</label><input class="form-input" id="dsr" placeholder="ABC123"/></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addDevice()">Add</button></div>
    </div>`);
}

function addDevice(){
  const mk=document.getElementById('dmk').value.trim(),ml=document.getElementById('dml').value.trim();
  if(!mk||!ml){showToast('Make and model required');return;}
  const nd={id:'d'+Date.now(),name:`${mk} ${ml}`,type:document.getElementById('dtp').value,make:mk,model:ml,serial:document.getElementById('dsr').value||'N/A',status:'available',assignedTo:null,condition:'new',purchaseDate:today()};
  devices.push(nd);closeModal();showToast(`${nd.name} added`);renderInventory();
}

// ── ASSIGNMENTS ──────────────────────────────────────────────────────────────
function renderAssignments(){
  document.getElementById('page').innerHTML=`
    <div class="page-header"><div><div class="page-title">Assignments</div><div class="page-subtitle">${assignments.length} active</div></div></div>
    <div class="table-wrap"><table><thead><tr><th>Employee</th><th>Device</th><th>Serial</th><th>Assigned</th><th>Status</th></tr></thead>
    <tbody>${assignments.map(a=>{const e=emp(a.employeeId),d=dev(a.deviceId);return`<tr><td>${personCell(e.name)}</td><td>${d.name}</td><td style="font-family:var(--mono);font-size:12px">${d.serial||'—'}</td><td>${relTime(a.assignedAt)}</td><td>${statusPill(a.status)}</td></tr>`;}).join('')}</tbody></table></div>`;
}

// ── TRACKS ───────────────────────────────────────────────────────────────────
let selectedTrackId=tracks[0].id;

function renderTracks(){
  const p=document.getElementById('page');
  p.style.padding='0';
  p.innerHTML=`
    <div style="display:flex;height:100%">
      <div style="width:260px;border-right:1px solid var(--border);overflow-y:auto;padding:16px;flex-shrink:0">
        <div style="font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;padding:0 4px">Track Templates</div>
        <div id="track-list">${trackListHTML()}</div>
        <button class="btn btn-secondary" style="width:100%;margin-top:8px;font-size:12px" onclick="showAddTrackModal()">+ New Track</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:28px" id="track-detail"></div>
    </div>
  `;
  renderTrackDetail(selectedTrackId);
}

function trackListHTML(){
  return tracks.map(t=>`
    <div style="padding:10px 12px;border-radius:var(--radius);cursor:pointer;margin-bottom:4px;border:1px solid ${selectedTrackId===t.id?'var(--accent)':'transparent'};background:${selectedTrackId===t.id?'var(--accent-light)':'transparent'}" onclick="selectTrack('${t.id}')">
      <div style="font-weight:500;font-size:13px;color:${selectedTrackId===t.id?'var(--accent-text)':'var(--text)'}">${t.name}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${t.type} · ${t.tasks.length} tasks</div>
    </div>`).join('');
}

function selectTrack(id){
  selectedTrackId=id;
  const tl=document.getElementById('track-list');if(tl)tl.innerHTML=trackListHTML();
  renderTrackDetail(id);
}

function renderTrackDetail(id){
  const t=tracks.find(x=>x.id===id);const d=document.getElementById('track-detail');if(!d||!t)return;
  d.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">${t.name}</div><div class="page-subtitle">Type: ${t.type} · Auto-apply: ${t.autoApply?'Yes':'No'}</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="showEditTrackModal('${t.id}')">Edit Track</button>
        <button class="btn btn-primary btn-sm" onclick="showToast('Apply track to employee')">Apply Track</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px">Tasks (${t.tasks.length})</div>
        <button class="btn btn-sm btn-secondary" onclick="showAddTaskModal('${t.id}')">+ Add Task</button>
      </div>
      <div id="task-list-${t.id}">
        ${taskListHTML(t)}
      </div>
    </div>
  `;
}

function taskListHTML(t){
  if(!t.tasks.length)return`<div style="font-size:12px;color:var(--text3);padding:8px 0">No tasks yet</div>`;
  return t.tasks.map((task,i)=>`
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:${i<t.tasks.length-1?'1px solid var(--border)':'none'}">
      <div style="width:22px;height:22px;border-radius:50%;background:var(--accent-light);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">${i+1}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:500">${task.name}</div><div style="font-size:11px;color:var(--text3)">Owner: ${task.ownerRole}</div></div>
      <div style="font-size:12px;color:var(--text2)">${task.dueDaysOffset===0?'Day 0':task.dueDaysOffset>0?`+${task.dueDaysOffset}d`:`${task.dueDaysOffset}d`}</div>
      <button class="btn-ghost btn-sm" style="color:var(--red);padding:4px 6px" onclick="deleteTask('${t.id}','${task.id}')">✕</button>
    </div>`).join('');
}

function deleteTask(trackId,taskId){
  const t=tracks.find(x=>x.id===trackId);
  t.tasks=t.tasks.filter(x=>x.id!==taskId);
  renderTrackDetail(trackId);
  const tl=document.getElementById('track-list');if(tl)tl.innerHTML=trackListHTML();
  showToast('Task removed');
}

function showAddTaskModal(trackId){
  showModal(`
    <div class="modal">
      <div class="modal-header"><div class="modal-title">Add Task</div><button class="detail-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Task Name</label><input class="form-input" id="tname" placeholder="e.g. Complete I-9 paperwork"/></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Owner Role</label><select class="form-input form-select" id="towner"><option>HR</option><option>IT</option><option>Manager</option><option>Finance</option><option>Employee</option></select></div>
          <div class="form-group"><label class="form-label">Due (days from start)</label><input type="number" class="form-input" id="tdays" placeholder="0" value="1"/></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addTask('${trackId}')">Add Task</button></div>
    </div>`);
}

function addTask(trackId){
  const name=document.getElementById('tname').value.trim();
  if(!name){showToast('Task name required');return;}
  const t=tracks.find(x=>x.id===trackId);
  t.tasks.push({id:'tt'+Date.now(),name,ownerRole:document.getElementById('towner').value,dueDaysOffset:parseInt(document.getElementById('tdays').value)||0});
  closeModal();showToast('Task added');
  renderTrackDetail(trackId);
  const tl=document.getElementById('track-list');if(tl)tl.innerHTML=trackListHTML();
}

function showEditTrackModal(id){
  const t=tracks.find(x=>x.id===id);
  showModal(`
    <div class="modal">
      <div class="modal-header"><div class="modal-title">Edit Track</div><button class="detail-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Track Name</label><input class="form-input" id="etname" value="${t.name}"/></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Type</label><select class="form-input form-select" id="ettype"><option${t.type==='company'?' selected':''}>company</option><option${t.type==='role'?' selected':''}>role</option><option${t.type==='client'?' selected':''}>client</option></select></div>
          <div class="form-group"><label class="form-label">Auto-apply</label><select class="form-input form-select" id="etauto"><option value="true"${t.autoApply?' selected':''}>Yes</option><option value="false"${!t.autoApply?' selected':''}>No</option></select></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" style="margin-right:auto" onclick="deleteTrack('${t.id}')">Delete Track</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTrack('${t.id}')">Save</button>
      </div>
    </div>`);
}

function saveTrack(id){
  const t=tracks.find(x=>x.id===id);
  t.name=document.getElementById('etname').value;
  t.type=document.getElementById('ettype').value;
  t.autoApply=document.getElementById('etauto').value==='true';
  closeModal();showToast('Track saved');renderTracks();
}

function deleteTrack(id){
  if(!confirm('Delete this track?'))return;
  const idx=tracks.findIndex(x=>x.id===id);
  tracks.splice(idx,1);
  selectedTrackId=tracks[0]?.id||null;
  closeModal();showToast('Track deleted');renderTracks();
}

function showAddTrackModal(){
  showModal(`
    <div class="modal">
      <div class="modal-header"><div class="modal-title">New Track</div><button class="detail-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Track Name</label><input class="form-input" id="ntname" placeholder="e.g. Design Onboarding"/></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Type</label><select class="form-input form-select" id="nttype"><option>company</option><option>role</option><option>client</option></select></div>
          <div class="form-group"><label class="form-label">Auto-apply</label><select class="form-input form-select" id="ntauto"><option value="false">No</option><option value="true">Yes</option></select></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addTrack()">Create</button></div>
    </div>`);
}

function addTrack(){
  const name=document.getElementById('ntname').value.trim();
  if(!name){showToast('Name required');return;}
  const nt={id:'t'+Date.now(),name,type:document.getElementById('nttype').value,autoApply:document.getElementById('ntauto').value==='true',tasks:[]};
  tracks.push(nt);selectedTrackId=nt.id;
  closeModal();showToast('Track created');renderTracks();
}

// ── REPORTS ──────────────────────────────────────────────────────────────────
function renderReports(){
  const p=document.getElementById('page');
  const hired=candidates.filter(c=>c.stage==='hired').length;
  const active=candidates.filter(c=>c.candStatus==='Active').length;
  const onHold=candidates.filter(c=>c.candStatus==='On Hold').length;
  const sources=[...new Set(candidates.map(c=>c.source))];
  const totalInterviews=candidates.reduce((n,c)=>n+c.interviews.length,0);
  p.innerHTML=`
    <div class="page-header"><div><div class="page-title">Reports</div><div class="page-subtitle">Overview</div></div></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Total Candidates</div><div class="stat-value">${candidates.length}</div></div>
      <div class="stat-card"><div class="stat-label">Hired</div><div class="stat-value" style="color:var(--green)">${hired}</div></div>
      <div class="stat-card"><div class="stat-label">Active Pipeline</div><div class="stat-value">${active}</div></div>
      <div class="stat-card"><div class="stat-label">Interviews Logged</div><div class="stat-value">${totalInterviews}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div style="font-weight:600;font-size:13px;margin-bottom:14px">Pipeline by Stage</div>
        ${STAGES.map(s=>{const n=candidates.filter(c=>c.stage===s).length;const pct=candidates.length?Math.round(n/candidates.length*100):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="text-transform:capitalize">${s}</span><span style="color:var(--text2)">${n}</span></div><div style="background:var(--bg);border-radius:100px;height:6px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--accent);border-radius:100px"></div></div></div>`;}).join('')}
      </div>
      <div class="card">
        <div style="font-weight:600;font-size:13px;margin-bottom:14px">By Source</div>
        ${sources.map(src=>{const n=candidates.filter(c=>c.source===src).length;return`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${src}</span><span style="font-weight:600">${n}</span></div>`;}).join('')}
      </div>
    </div>
  `;
}

// ── SETTINGS ─────────────────────────────────────────────────────────────────
function renderSettings(){
  const p=document.getElementById('page');
  p.innerHTML=`
    <div class="page-header"><div><div class="page-title">Settings</div></div></div>
    <div class="tabs">
      <div class="tab active" onclick="settingsTab(this,'general')">General</div>
      <div class="tab" onclick="settingsTab(this,'dropdowns')">Dropdowns</div>
      <div class="tab" onclick="settingsTab(this,'team')">Team Access</div>
    </div>
    <div id="settings-content">
      <div class="card" style="max-width:520px">
        <div style="font-weight:600;font-size:13px;margin-bottom:16px">Company</div>
        <div class="form-group"><label class="form-label">Company Name</label><input class="form-input" value="V.Two"/></div>
        <div class="form-group"><label class="form-label">Default Location</label><select class="form-input form-select"><option>Remote</option><option>NYC</option><option>SF</option></select></div>
        <button class="btn btn-primary btn-sm" onclick="showToast('Settings saved')">Save Changes</button>
      </div>
    </div>
  `;
}

function settingsTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  const c=document.getElementById('settings-content');
  if(tab==='general'){
    c.innerHTML=`<div class="card" style="max-width:520px"><div style="font-weight:600;font-size:13px;margin-bottom:16px">Company</div><div class="form-group"><label class="form-label">Company Name</label><input class="form-input" value="V.Two"/></div><button class="btn btn-primary btn-sm" onclick="showToast('Settings saved')">Save</button></div>`;
  }else if(tab==='dropdowns'){
    const lists=[{k:'candidate_source',vals:SOURCES},{k:'seniority',vals:SENIORITIES},{k:'employment_type',vals:EMP_TYPES},{k:'candidate_status',vals:CAND_STATUS}];
    c.innerHTML=`<div class="card" style="max-width:520px">${lists.map(l=>`<div style="margin-bottom:20px"><div style="font-weight:600;font-size:13px;margin-bottom:8px">${l.k.replace(/_/g,' ')}</div><div style="display:flex;flex-wrap:wrap;gap:6px">${l.vals.map(v=>`<span class="pill pill-gray">${v}</span>`).join('')}<button class="btn btn-sm btn-secondary" onclick="showToast('Edit list')">+ Edit</button></div></div>`).join('')}</div>`;
  }else{
    c.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Employee</th><th>Role</th><th>Access</th></tr></thead><tbody>${employees.map(e=>`<tr><td>${personCell(e.name)}</td><td>${e.role}</td><td><select class="form-input" style="width:auto;padding:4px 8px;font-size:12px"><option>Admin</option><option>Viewer</option></select></td></tr>`).join('')}</tbody></table></div>`;
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
nav('dashboard');
</script>
</body>
</html>
