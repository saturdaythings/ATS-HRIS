<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.Two Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f2f1ed;--border:#e5e3dc;--border2:#d4d2cb;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9e9d98;
  --accent:#5b4ff5;--accent-light:#eeecfe;--accent-text:#3d33c7;
  --green:#1a9c6e;--green-light:#e6f7f1;--amber:#b86c0a;--amber-light:#fef3e2;
  --red:#c0392b;--red-light:#fdecea;--blue:#1a6fb5;--blue-light:#e8f2fc;
  --sidebar-w:220px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --radius:8px;--radius-lg:12px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--font)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:0 0 16px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;min-height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.page{flex:1;overflow-y:auto;padding:28px 28px 40px}
.sidebar-logo{padding:18px 16px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px}
.logo-text{font-weight:600;font-size:14px}
.nav-section{padding:0 8px;margin-bottom:4px}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;transition:all .12s}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent-text);font-weight:500}
.nav-icon{width:16px;height:16px;opacity:.7;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.topbar-title{font-weight:500;font-size:14px;flex:1}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-light);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;border:none}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4a3ee0}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--bg)}
.btn-ghost{background:none;color:var(--text2);padding:6px 10px}.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red-light);color:var(--red)}.btn-danger:hover{background:#f9d8d5}
.btn-link{background:none;color:var(--accent);padding:0;font-size:13px;text-decoration:underline;cursor:pointer;border:none;font-family:var(--font)}
.btn-active{background:var(--accent-light);color:var(--accent-text);border-color:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:600;letter-spacing:-.4px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px}
.stat-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:600;letter-spacing:-.8px;line-height:1}
.stat-sub{font-size:12px;color:var(--text3);margin-top:4px}
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.filter-search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;min-width:220px}
.filter-search input{background:none;border:none;outline:none;font-size:13px;color:var(--text);width:100%}
.filter-search input::placeholder{color:var(--text3)}
.filter-select{padding:6px 28px 6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b6a65' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;cursor:pointer}
.filter-select:focus{border-color:var(--accent)}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-left:auto}
.view-btn{padding:6px 10px;font-size:12px;color:var(--text2);cursor:pointer;background:var(--surface);border:none;font-family:var(--font);transition:all .12s}
.view-btn.active{background:var(--accent-light);color:var(--accent-text)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text)}
th .sort-arrow{margin-left:4px;opacity:.4;font-size:10px}
th.sorted .sort-arrow{opacity:1;color:var(--accent)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--bg)}
tr.selected td{background:var(--accent-light)}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap}
.pill-green{background:var(--green-light);color:var(--green)}
.pill-amber{background:var(--amber-light);color:var(--amber)}
.pill-red{background:var(--red-light);color:var(--red)}
.pill-blue{background:var(--blue-light);color:var(--blue)}
.pill-purple{background:var(--accent-light);color:var(--accent-text)}
.pill-gray{background:var(--surface2);color:var(--text2)}
.person-cell{display:flex;align-items:center;gap:10px}
.person-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.person-name{font-weight:500}
.person-sub{font-size:12px;color:var(--text2)}
.split-layout{display:flex;gap:0;overflow:hidden}
.split-list{flex:1;overflow-y:auto}
.split-detail{width:420px;min-width:420px;border-left:1px solid var(--border);overflow-y:auto;background:var(--surface);display:none;flex-direction:column}
.split-detail.open{display:flex}
.detail-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.detail-close{width:28px;height:28px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;line-height:1;background:none;border:none}
.detail-close:hover{background:var(--bg)}
.detail-body{padding:20px;overflow-y:auto;flex:1}
.detail-section{margin-bottom:20px}
.detail-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:12px;color:var(--text2)}
.detail-val{font-size:13px;font-weight:500;text-align:right;max-width:60%}
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px}
.kanban-col{min-width:205px;max-width:205px;background:var(--bg);border-radius:var(--radius-lg);padding:12px;display:flex;flex-direction:column;gap:8px}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.kanban-col-name{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.4px;text-transform:uppercase}
.kanban-count{background:var(--border);color:var(--text2);border-radius:100px;font-size:11px;font-weight:600;padding:1px 7px}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px;cursor:pointer;transition:all .12s}
.kanban-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(91,79,245,.1)}
.kanban-card.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.kanban-name{font-weight:500;font-size:13px;margin-bottom:2px}
.kanban-role{font-size:12px;color:var(--text2);margin-bottom:6px}
.kanban-meta{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.kanban-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.run-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color .12s}
.run-card:hover{border-color:var(--accent)}
.run-progress-wrap{background:var(--bg);border-radius:100px;height:6px;margin-bottom:10px;overflow:hidden}
.run-progress-fill{height:100%;background:var(--accent);border-radius:100px}
.task-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:12px;padding-bottom:16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center;width:20px;flex-shrink:0}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:4px;flex-shrink:0}
.tl-line{flex:1;width:1px;background:var(--border);margin-top:4px}
.tl-item:last-child .tl-line{display:none}
.tl-desc{font-size:13px;font-weight:500}
.tl-time{font-size:11px;color:var(--text3);margin-top:2px}
.device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.device-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:border-color .12s}
.device-card:hover{border-color:var(--accent)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent-text);border-bottom-color:var(--accent)}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;transition:border-color .12s}
.form-input:focus{border-color:var(--accent)}
.form-select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b6a65' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:680px}
.modal-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-weight:600;font-size:16px}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;z-index:200;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty-state{padding:48px 20px;text-align:center}
.empty-title{font-weight:500;font-size:14px;margin-bottom:4px}
.empty-sub{font-size:12px;color:var(--text3)}
.interview-card{background:var(--bg);border-radius:var(--radius);padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.score-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:3px 10px;font-size:12px;color:var(--text2)}
.tag button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;padding:0 0 0 2px}
.tag button:hover{color:var(--red)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
/* Bottom nav — hidden on desktop, shown on mobile */
.bottom-nav{display:none}
/* ── MOBILE ─────────────────────────────────────────────── */
@media (max-width: 768px) {
  /* App layout — make room for bottom nav */
  .app{flex-direction:column}
  .main{width:100%;padding-bottom:60px}

  /* Sidebar */
  .sidebar{position:fixed;left:-100%;top:0;bottom:0;z-index:200;transition:left .2s;box-shadow:4px 0 20px rgba(0,0,0,.15);width:var(--sidebar-w)}
  .sidebar.open{left:0}
  .sidebar-backdrop{z-index:199}

  /* Topbar */
  .topbar{padding:0 12px;height:52px}
  .hamburger{display:flex!important;min-height:44px}

  /* Page */
  .page{padding:16px;overflow-y:auto;flex:1}

  /* FAB clears bottom nav */
  #cp-fab{bottom:76px}
  /* Bottom nav */
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--surface);border-top:1px solid var(--border);z-index:100;flex:1}
  .bottom-nav-item{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);font-weight:500;cursor:pointer;border-top:3px solid transparent;position:relative}
  .bottom-nav-item.active{color:var(--accent-text);border-top-color:var(--accent)}

  /* Page title */
  .page-title{font-size:20px;font-weight:600}

  /* Stat grid — 2 col */
  .stat-grid{grid-template-columns:1fr 1fr;gap:12px}

  /* Filter chips — pill style */
  .filter-search,.filter-select,.view-toggle{display:none}
  .hiring-filter-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .hiring-filter-chips::-webkit-scrollbar{display:none}
  .filter-chip{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:6px 16px;border-radius:100px;font-size:13px;white-space:nowrap;min-height:34px;display:flex;align-items:center;cursor:pointer;transition:all .12s}
  .filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* Kanban — vertical stack */
  .kanban{flex-direction:column;overflow-x:hidden;gap:12px}
  .kanban-col{width:100%;min-width:unset;max-width:unset}

  /* Kanban card */
  .kanban-card{padding:12px}

  /* Form rows — single col */
  .form-row,.form-row-3{grid-template-columns:1fr!important;gap:12px}

  /* Paired fields stay 2-col */
  .form-row-paired{grid-template-columns:1fr 1fr!important}

  /* All inputs 44px min */
  .form-input,.form-select,.filter-select,input[type="date"],input[type="text"],input[type="email"],textarea{min-height:44px;padding:10px 12px}

  /* All buttons 44px min, full width */
  .btn{min-height:44px;width:100%;gap:8px;padding:10px 12px}
  .modal-footer .btn{width:100%}

  /* Bottom sheet modals */
  .modal-overlay{padding:0;align-items:flex-end;bottom:0}
  .modal,.modal-lg{position:fixed;max-width:100%;width:100%;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;margin:0;padding-top:24px}
  .modal::before{content:'';display:block;width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;cursor:grab}
  .modal-header{padding:0 20px 16px;border-bottom:1px solid var(--border)}
  .modal-body{padding:0 20px}
  .modal-footer{padding:16px 20px;flex-wrap:wrap;gap:8px}

  /* Detail panels as bottom sheets */
  .split-detail{position:fixed;bottom:0;left:0;right:0;width:100%!important;max-height:88vh;border-radius:20px 20px 0 0;border-left:none;border-top:none;z-index:50;display:flex!important;flex-direction:column;overflow-y:auto;padding-top:24px;margin-bottom:60px}
  .split-detail::before{content:'';display:block;width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;position:absolute;top:8px;left:50%;transform:translateX(-50%)}
  .detail-header{padding:0 20px 16px;border-bottom:1px solid var(--border)}
  .detail-body{padding:0 20px;overflow-y:auto;flex:1}
  .detail-row{display:flex;flex-direction:column;gap:4px;padding:12px 0;border-bottom:1px solid var(--border)}
  .detail-key{font-size:11px;color:var(--text3);text-transform:uppercase;font-weight:600}
  .detail-val{font-size:14px;color:var(--text)}

  /* Tables — hide on mobile, show cards below */
  .table-wrap{border:none;background:none}
  .table-wrap table thead{display:none}
  .table-wrap table tbody{display:contents}
  .table-wrap table tr{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px;gap:8px;cursor:pointer;min-height:44px}
  .table-wrap table tr.selected{background:var(--accent-light);border-color:var(--accent)}
  .table-wrap table td{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border:none;font-size:13px}

  /* Touch targets */
  .clickable,tr.clickable,[role="button"],.btn,.nav-item,.tab,button{min-height:44px}
  button{padding:10px 12px}

  /* Stat card */
  .stat-card{padding:16px 12px}

  /* Device grid */
  .device-grid{grid-template-columns:1fr 1fr;gap:12px}
  .device-card{padding:12px}

  /* Run card */
  .run-card{padding:12px;margin-bottom:12px;min-height:44px}

  /* Settings — single column */
  #settings-content > div{grid-template-columns:1fr!important}

  /* Filter bar hide, show chips instead */
  .filter-bar{display:none}

  /* Split layout — stack */
  .split-layout{flex-direction:column}
  .split-list{width:100%}

  /* Tracks two-panel */
  .page > div[style*="display:flex"]{flex-direction:column!important}
  div[style*="width:260px"]{width:100%!important;border-right:none;border-bottom:1px solid var(--border);max-height:50vh}
}

@media (max-width: 480px) {
  .stat-grid{grid-template-columns:1fr}
  .device-grid{grid-template-columns:1fr}
  .page{padding:12px}
}
/* ── GLOBAL SEARCH ───────────────────────────────────────────────────────── */
.gs-wrap{position:relative;display:flex;align-items:center;gap:6px}
.gs-icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius)}
.gs-icon-btn:hover{background:var(--bg)}
.gs-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;width:0;transition:width .2s,opacity .2s;opacity:0;pointer-events:none}
.gs-input.open{width:220px;opacity:1;pointer-events:auto}
.gs-input:focus{border-color:var(--accent)}
.gs-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 8px 24px rgba(0,0,0,.12);width:340px;z-index:500;overflow:hidden;display:none}

.gs-group{padding:6px 0}
.gs-group-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:4px 14px}
.gs-item{padding:8px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:background .08s}
.gs-item:hover{background:var(--bg)}
.gs-item-name{font-weight:500;color:var(--text)}
.gs-item-sub{font-size:11px;color:var(--text3)}

#cp-fab{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:#1a1a18;color:#fff;font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.25);z-index:300;cursor:pointer;transition:background .12s;border:none;font-family:var(--font)}

.cp-input::placeholder{color:var(--text3)}
.cp-body{overflow-y:auto;padding:8px 0;max-height:360px}
.cp-group-label{padding:6px 16px 2px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase}
.cp-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background .08s}
.cp-item:hover,.cp-item.selected{background:var(--bg)}
.cp-item-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.cp-item-sub{font-size:11px;color:var(--text3);margin-top:1px}
.cp-step-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.cp-step-back{width:28px;height:28px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text2)}

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHEET_ID='1yw8uHotULPJnl0oDFG3AJ8Mcua7LU_InQUc7saiBd3A';
const BASE=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;

// Credentials loaded from config.js (gitignored)
// See config.example.js for setup instructions
const SA_EMAIL = window.__ENV__?.SA_EMAIL || '';
const SA_KEY = window.__ENV__?.SA_KEY || '';

// ── JWT / SERVICE ACCOUNT AUTH ────────────────────────────────────────────────
let _tokenCache={token:null,exp:0};

function b64url(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function pemToBytes(pem){
  const b64=pem.replace(/-----[^-]+-----/g,'').replace(/\s+/g,'');
  const bin=atob(b64);
  return Uint8Array.from(bin,c=>c.charCodeAt(0));
}

async function getAccessToken(){
  const now=Math.floor(Date.now()/1000);
  if(_tokenCache.token&&now<_tokenCache.exp-60)return _tokenCache.token;

  const header=b64url(new TextEncoder().encode(JSON.stringify({alg:'RS256',typ:'JWT'})));
  const claim=b64url(new TextEncoder().encode(JSON.stringify({
    iss:SA_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',
    aud:'https://oauth2.googleapis.com/token',iat:now,exp:now+3600
  })));
  const sigInput=new TextEncoder().encode(`${header}.${claim}`);

  const keyBytes=pemToBytes(SA_KEY);
  const cryptoKey=await crypto.subtle.importKey(
    'pkcs8',keyBytes,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']
  );
  const sigBuf=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',cryptoKey,sigInput);
  const jwt=`${header}.${claim}.${b64url(sigBuf)}`;

  const res=await fetch('https://oauth2.googleapis.com/token',{
    method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(`Token error: ${e.error_description||res.status}`);}
  const d=await res.json();
  _tokenCache={token:d.access_token,exp:now+d.expires_in};
  return d.access_token;
}

// ── GOOGLE SHEETS ─────────────────────────────────────────────────────────────
async function sheetsGet(tab){
  const token=await getAccessToken();
  const r=await fetch(`${BASE}/values/${encodeURIComponent(tab)}`,{
    headers:{Authorization:`Bearer ${token}`}
  });
  if(!r.ok)throw new Error(`Read ${tab}: ${r.status}`);
  const d=await r.json();const rows=d.values||[];
  if(rows.length<2)return[];
  const h=rows[0];
  return rows.slice(1).map(row=>{const o={};h.forEach((k,i)=>{o[k]=row[i]??'';});return o;});
}

async function sheetsSet(tab,data){
  setSyncState('syncing');
  try{
    const token=await getAccessToken();
    const authHeader={Authorization:`Bearer ${token}`,'Content-Type':'application/json'};
    const clearR=await fetch(`${BASE}/values/${encodeURIComponent(tab)}:clear`,{
      method:'POST',headers:authHeader,body:'{}'
    });
    if(!clearR.ok){const err=await clearR.json().catch(()=>({}));throw new Error(`Clear ${tab}: ${clearR.status} ${err?.error?.message||''}`);}
    if(!data.length){setSyncState('ok');return;}
    const headers=Object.keys(data[0]);
    const values=[headers,...data.map(row=>headers.map(h=>{const v=row[h];if(v===null||v===undefined)return'';if(typeof v==='object')return JSON.stringify(v);return String(v);}))];
    const writeR=await fetch(`${BASE}/values/${encodeURIComponent(tab)}?valueInputOption=RAW`,{
      method:'PUT',headers:authHeader,body:JSON.stringify({values})
    });
    if(!writeR.ok){const err=await writeR.json().catch(()=>({}));throw new Error(`Write ${tab}: ${writeR.status} ${err?.error?.message||''}`);}
    setSyncState('ok');
  }catch(e){setSyncState('error');showToast('Save failed: '+e.message);throw e;}
}

function setSyncState(s){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  if(!dot)return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  txt.textContent=s==='syncing'?'Saving...':s==='error'?'Error':'Synced';
}

// SEED only provides default list values (dropdown options). All other tables start empty.
const SEED={lists:DEFAULT_LISTS};

const SHEET_KEYS=['candidates','employees','devices','assignments','tracks','tasks','onboardingRuns','runTasks','interviews','activities','lists'];
const SHEET_NAMES={candidates:'Candidates',employees:'Employees',devices:'Devices',assignments:'Assignments',tracks:'Tracks',tasks:'TrackTasks',onboardingRuns:'OnboardingRuns',runTasks:'RunTasks',interviews:'Interviews',activities:'Activities',lists:'Lists'};

async function loadAll(){
  setSyncState('syncing');
  await Promise.all(SHEET_KEYS.map(async key=>{
    try{
      const rows=await sheetsGet(SHEET_NAMES[key]);
      if(rows.length>0){DB[key]=rows;}
      else{
        // Only lists gets a default seed so dropdowns always work
        DB[key]=(key==='lists'?DEFAULT_LISTS:[]);
        if(key==='lists')await sheetsSet(SHEET_NAMES[key],DB[key]);
      }
    }catch(e){console.warn(key,e);DB[key]=(key==='lists'?DEFAULT_LISTS:[]);}
  }));
  setSyncState('ok');
}

async function save(key){
  try{await sheetsSet(SHEET_NAMES[key],DB[key]);}
  catch(e){setSyncState('error');showToast('Save failed');console.error(e);}

const STAGES=['sourced','screening','interview','offer','hired'];

const AVCOLORS=['#f4d4e8','#d4e8f4','#d4f4e0','#f4ead4','#e0d4f4','#f4d4d4','#d4f4f0'];
const av=n=>`background:${AVCOLORS[n.charCodeAt(0)%AVCOLORS.length]};color:#333`;

function groupOnboardingByEmployee(){
  const groups={};
  DB.onboardingRuns.filter(r=>r.status==='active'&&r.type==='onboarding').forEach(run=>{
    const emp=DB.employees.find(e=>e.id===run.employeeId);
    if(!emp)return;
    if(!groups[emp.id]){groups[emp.id]={empId:emp.id,empName:emp.name,role:emp.role,startDate:emp.startDate,tracks:[]};}
    const runTasks=DB.runTasks.filter(t=>t.runId===run.id);
    const pending=runTasks.filter(t=>t.status==='pending');
    const completed=runTasks.filter(t=>t.status==='completed').length;
    const track=DB.tracks.find(t=>t.id===run.trackId);
    groups[emp.id].tracks.push({runId:run.id,trackName:track?track.name:'Track',pct:runTasks.length?Math.round(completed/runTasks.length*100):0,nextSteps:pending.slice(0,2).map(t=>t.name),allDone:pending.length===0});
  });
  return Object.values(groups);
}

function groupOffboardingByEmployee(){
  const groups={};
  DB.onboardingRuns.filter(r=>r.status==='active'&&r.type==='offboarding').forEach(run=>{
    const emp=DB.employees.find(e=>e.id===run.employeeId);
    if(!emp)return;
    if(!groups[emp.id]){groups[emp.id]={empId:emp.id,empName:emp.name,role:emp.role,endDate:emp.endDate,tracks:[]};}
    const runTasks=DB.runTasks.filter(t=>t.runId===run.id);
    const pending=runTasks.filter(t=>t.status==='pending');
    const completed=runTasks.filter(t=>t.status==='completed').length;
    const track=DB.tracks.find(t=>t.id===run.trackId);
    groups[emp.id].tracks.push({runId:run.id,trackName:track?track.name:'Track',pct:runTasks.length?Math.round(completed/runTasks.length*100):0,nextSteps:pending.slice(0,2).map(t=>t.name),allDone:pending.length===0});
  });
  return Object.values(groups);
}

function renderDashboard(){
  var p=document.getElementById('page');
  // Upcoming interviews (future, sorted ascending)
  var upcomingIvs=[];
  DB.interviews.forEach(function(iv){
    var cand=DB.candidates.find(function(c){return c.id===iv.candidateId;});
    if(!cand)return;
    if(new Date(iv.date)>new Date()){
      var allCandIvs=DB.interviews.filter(function(i){return i.candidateId===iv.candidateId;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
      var ivNum=allCandIvs.findIndex(function(i){return i.id===iv.id;})+1;
      upcomingIvs.push({candId:cand.id,candName:cand.name,role:cand.role,interviewer:iv.interviewers||'',date:iv.date,num:ivNum,initials:(cand.name.match(/\b\w/g)||[]).join('')});
    }
  });
  upcomingIvs.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  // Recent interviews (past, descending)
  var recentIvs=[];
  DB.interviews.forEach(function(iv){
    var cand=DB.candidates.find(function(c){return c.id===iv.candidateId;});
    if(!cand)return;
    if(new Date(iv.date)<=new Date()){
      var allCandIvs=DB.interviews.filter(function(i){return i.candidateId===iv.candidateId;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
      var ivNum=allCandIvs.findIndex(function(i){return i.id===iv.id;})+1;
      recentIvs.push({candId:cand.id,candName:cand.name,role:cand.role,interviewer:iv.interviewers||'',date:iv.date,num:ivNum,stage:cand.stage,initials:(cand.name.match(/\b\w/g)||[]).join('')});
    }
  });
  recentIvs.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  // Upcoming start dates
  var upcomingStarts=DB.employees.filter(function(e){return e.startDate&&new Date(e.startDate)>new Date();}).map(function(e){
    var daysAway=Math.ceil((new Date(e.startDate)-new Date())/86400000);
    return{empId:e.id,empName:e.name,role:e.role,startDate:e.startDate,daysAway:daysAway,initials:(e.name.match(/\b\w/g)||[]).join('')};
  }).sort(function(a,b){return new Date(a.startDate)-new Date(b.startDate);});
  // Upcoming offboards
  var upcomingOffboards=DB.employees.filter(function(e){return e.status==='offboarding';}).map(function(e){
    var daysAway=e.endDate?Math.ceil((new Date(e.endDate)-new Date())/86400000):null;
    return{empId:e.id,empName:e.name,role:e.role,endDate:e.endDate||'',daysAway:daysAway,initials:(e.name.match(/\b\w/g)||[]).join('')};
  });
  // Onboarding/offboarding groups (use existing helpers, limit to 2 for preview)
  var onboardGroups=groupOnboardingByEmployee().slice(0,2);
  var offboardGroups=groupOffboardingByEmployee().slice(0,2);

  // ── ROW 1: Upcoming start dates + Active onboarding ──
  var html='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">';
  html+='<div>'+dashSectionHeader('Upcoming start dates','directory')+'<div class="card">';
  if(upcomingStarts.length>0){html+=upcomingStarts.slice(0,3).map(dashStartRow).join('');}
  else{html+=dashEmpty('No upcoming start dates');}
  html+='</div></div>';
  html+='<div>'+dashSectionHeader('Active onboarding','onboarding');
  if(onboardGroups.length>0){html+=onboardGroups.map(function(emp){return dashGroupCard(emp,'onboarding');}).join('');}
  else{html+='<div class="card">'+dashEmpty('No active onboarding')+'</div>';}
  html+='</div>';
  html+='</div>';

  // ── ROW 2: Upcoming interviews + Recent interviews ──
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">';
  html+='<div>'+dashSectionHeader('Upcoming interviews','hiring')+'<div class="card">';
  if(upcomingIvs.length>0){html+=upcomingIvs.slice(0,4).map(dashUpcomingIvRow).join('');}
  else{html+=dashEmpty('No upcoming interviews');}
  html+='</div></div>';
  html+='<div>'+dashSectionHeader('Recent interviews','hiring')+'<div class="card">';
  if(recentIvs.length>0){html+=recentIvs.slice(0,4).map(dashRecentIvRow).join('');}
  else{html+=dashEmpty('No recent interviews');}
  html+='</div></div>';
  html+='</div>';

  // ── ROW 3: Upcoming offboards + Active offboarding ──
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  html+='<div>'+dashSectionHeader('Upcoming offboards','offboarding')+'<div class="card">';
  if(upcomingOffboards.length>0){html+=upcomingOffboards.slice(0,3).map(dashOffboardRow).join('');}
  else{html+=dashEmpty('No upcoming offboards');}
  html+='</div></div>';
  html+='<div>'+dashSectionHeader('Active offboarding','offboarding');
  if(offboardGroups.length>0){html+=offboardGroups.map(function(emp){return dashGroupCard(emp,'offboarding');}).join('');}
  else{html+='<div class="card">'+dashEmpty('No active offboarding')+'</div>';}
  html+='</div>';
  html+='</div>';

  p.innerHTML=html;
}

let selectedCandId=null;

function getFilteredCands(){
  let list=[...DB.candidates];
  const f=hiringFilters;
  // Get candidates in active onboarding (exclude from hired list)
  const empWithActiveOnboarding=DB.onboardingRuns.filter(r=>r.status==='active'&&r.type==='onboarding').map(r=>r.employeeId);
  const onboardingEmpNames=DB.employees.filter(e=>empWithActiveOnboarding.includes(e.id)).map(e=>e.name);
  // In kanban view, hide Hired/Closed by default unless a status filter is explicitly set or showArchived is on
  if(hiringView==='kanban'&&!f.status&&!f.showArchived){
    list=list.filter(c=>c.candStatus!=='Hired'&&c.candStatus!=='Closed');
  }
  // Exclude candidates with active onboarding runs
  list=list.filter(c=>!onboardingEmpNames.includes(c.name));
  if(f.q){const q=f.q.toLowerCase();list=list.filter(c=>c.name.toLowerCase().includes(q)||c.role.toLowerCase().includes(q)||(c.city||'').toLowerCase().includes(q));}
  if(f.status)list=list.filter(c=>c.candStatus===f.status);
  if(f.stage)list=list.filter(c=>c.stage===f.stage);
  if(f.specialty)list=list.filter(c=>c.specialty===f.specialty);
  if(f.location)list=list.filter(c=>(c.city||'').toLowerCase().includes(f.location.toLowerCase())||(c.state||'').toLowerCase().includes(f.location.toLowerCase()));
  return list;
}

function refreshHiringView(){
  const list=getFilteredCands();
  const cnt=document.getElementById('cand-count');
  const total=DB.candidates.length;
  const archived=DB.candidates.filter(c=>c.candStatus==='Hired'||c.candStatus==='Closed').length;
  if(cnt)cnt.textContent=`${list.length} of ${total} candidates${archived&&hiringView==='kanban'&&!hiringFilters.showArchived&&!hiringFilters.status?` (${archived} archived hidden)`:''}`;
  // Update view toggle buttons
  const kb=document.getElementById('vbtn-kanban');const tb=document.getElementById('vbtn-table');
  if(kb)kb.classList.toggle('active',hiringView==='kanban');
  if(tb)tb.classList.toggle('active',hiringView==='table');
  // Update archive toggle label
  const at=document.getElementById('archive-toggle');
  const hiddenCount=DB.candidates.filter(c=>c.candStatus==='Hired'||c.candStatus==='Closed').length;
  if(at){at.textContent=hiringFilters.showArchived?`Showing Hired & Closed${hiddenCount>0?' ('+hiddenCount+')':''}`:'Show Hired & Closed'+(hiddenCount>0?' ('+hiddenCount+')':'');at.className='btn btn-sm '+(hiringFilters.showArchived?'btn-active btn-secondary':'btn-secondary');}
  const main=document.getElementById('hiring-main');
  if(!main)return;
  if(hiringView==='kanban')renderKanban(list,main);
  else renderCandTable(list,main);
}

function renderKanban(list,container){
  var colsHtml='';

      cardsHtml+='<div class="kanban-card'+(selectedCandId===c.id?' selected':'')+'" draggable="true" ondragstart="kanDragStart(event,\''+c.id+'\')" onclick="selectCand(\''+c.id+'\')">'

function renderCandTable(list,container){
  const sortedList=[...list].sort((a,b)=>{
    const av=a[sortCol]||'',bv=b[sortCol]||'';
    return av.localeCompare(bv)*sortDir;
  });
  const arrow=d=>`<span class="sort-arrow">${d===1?'↑':'↓'}</span>`;
  const th=(col,label)=>`<th onclick="tableSortBy('${col}')" class="${sortCol===col?'sorted':''}">${label}${sortCol===col?arrow(sortDir):''}</th>`;
  container.innerHTML=`<div class="table-wrap"><table>
    <thead><tr>
      ${th('name','Name')}${th('role','Role')}${th('seniority','Seniority')}${th('specialty','Specialty')}${th('stage','Stage')}${th('candStatus','Status')}${th('empType','Type')}${th('compAmount','Comp')}${th('source','Source')}${th('city','Location')}

function buildIvCards(ivs,candId){
  if(!ivs.length)return'<div style="font-size:12px;color:var(--text3);padding:8px 0">No interviews logged yet</div>';
  var past=ivs.filter(function(iv){return new Date(iv.date)<=new Date();}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  var future=ivs.filter(function(iv){return new Date(iv.date)>new Date();}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var sorted=past.concat(future);
  return sorted.map(function(iv){
    var isFuture=new Date(iv.date)>new Date();
    var dateHtml=isFuture
      ?'<div style="font-weight:500;font-size:13px;color:#185FA5">'+iv.date+' <span style="font-size:11px;font-weight:400">Upcoming</span></div>'
      :'<div style="font-weight:500;font-size:13px">'+iv.date+'</div>';
    var notesHtml=iv.notes?'<p style="font-size:12px;color:var(--text2);line-height:1.5">'+iv.notes+'</p>':'';
    return '<div class="interview-card">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
      +'<div>'+dateHtml+'<div style="font-size:12px;color:var(--text2)">'+(iv.interviewers||'—')+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px">'+scoreDisplay(iv.score)
      +'<button class="btn btn-sm btn-secondary" title="Edit" onclick="showEditIvModal(\''+iv.id+'\',\''+candId+'\')">'+PENCIL_BTN+'</button>'
      +'<button class="btn-ghost btn-sm" style="color:var(--red);padding:4px 6px" onclick="deleteIv(\''+iv.id+'\',\''+candId+'\')">\u00d7</button>'
      +'</div></div>'

      +'</div>';
  }).join('');
}

function closeCandDetail(){selectedCandId=null;const d=document.getElementById('cand-detail');if(d)d.classList.remove('open');refreshHiringView();}

async function moveStage(id,stage){
  const c=DB.candidates.find(x=>x.id===id);if(!c)return;
  if(stage==='hired'){
    // Only show promote form if they haven't already been promoted to an employee
    const alreadyEmployee=DB.employees.find(e=>e.name===c.name);
    if(!alreadyEmployee){promoteCandidate(id);return;}
    // Already promoted — just update stage/status silently
    c.stage=stage;c.candStatus='Hired';touch(c);
    await save('candidates');showToast(`${c.name} → hired`);renderCandDetail(id);refreshHiringView();
    return;
  }
  c.stage=stage;touch(c);
  DB.activities.unshift({id:uid(),type:'stage',desc:`${c.name} moved to ${stage}`,at:now()});
  await save('candidates');await save('activities');
  showToast(`${c.name} → ${stage}`);renderCandDetail(id);refreshHiringView();
}

async function setCandStatus(id,status){
  const c=DB.candidates.find(x=>x.id===id);if(!c)return;
  if(status==='Hired'){promoteCandidate(id);return;}
  c.candStatus=status;touch(c);
  await save('candidates');
  showToast(`Status → ${status}`);renderCandDetail(id);refreshHiringView();
}

  const c=DB.candidates.find(x=>x.id===id);
  const autoEmail=c.name.split(' ')[0].toLowerCase()+'@vtwo.co';
  const empOptions=DB.employees.map(e=>`<option value="${e.id}">${e.name} — ${e.role}</option>`).join('');

async function doPromote(id){
  const c=DB.candidates.find(x=>x.id===id);
  c.candStatus='Hired';c.stage='hired';touch(c);
  const mgrId=document.getElementById('pmgr').value;
  const buddyId=document.getElementById('pbuddy').value;
  const mgrName=(mgrId?DB.employees.find(x=>x.id===mgrId)?.name:'')|| 'TBD';
  const buddyName=(buddyId?DB.employees.find(x=>x.id===buddyId)?.name:'')|| '';
  const client=document.getElementById('pclient').value;
  const email=document.getElementById('pemail').value.trim()||c.name.split(' ')[0].toLowerCase()+'@vtwo.co';
  const startDate=document.getElementById('pstart').value;
  const status=(()=>{if(!startDate)return 'onboarding';return new Date(startDate)>new Date()?'onboarding':'active';})();
  const ne={id:uid(),name:c.name,role:c.role,dept:document.getElementById('pdept').value,status,client:client||'',location:document.getElementById('ploc').value,city:c.city||'',state:c.state||'',country:c.country||'US',manager:mgrName,buddy:buddyName,startDate,email,phone:'—'};
  DB.employees.push(ne);
  DB.activities.unshift({id:uid(),type:'hire',desc:`${c.name} promoted to employee`,at:now()});
  await save('candidates');await save('employees');await save('activities');
  closeModal();
  renderCandDetail(id);
  refreshHiringView();
  // Offer to start onboarding run immediately
  const onboardingTracks = DB.tracks.filter(t=>t.type==='company'||t.type==='role');
  if(onboardingTracks.length>0){
    showModal(`<div class="modal"><div class="modal-header"><div class="modal-title">Start Onboarding for ${ne.name}?</div><button class="detail-close" onclick="closeModal()">×</button></div><div class="modal-body">
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px">${ne.name} has been added to the Directory with status <strong>${ne.status}</strong>. Would you like to start an onboarding run now?</p>
      <div class="form-group"><label class="form-label">Track Template</label><select class="form-input form-select" id="quick-track">${onboardingTracks.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-input" id="quick-start" value="${ne.startDate}"/></div>
    </div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal();showToast('${ne.name} in Directory — toggle Show Hired & Closed in Hiring to see them')">Skip for now</button><button class="btn btn-primary" onclick="quickStartOnboarding('${ne.id}')">Start Onboarding</button></div></div>`);
  } else {
    showToast(`${ne.name} promoted → now in Directory`);
  }
}

async function quickStartOnboarding(empId){
  const trackId=document.getElementById('quick-track').value;
  const startDate=document.getElementById('quick-start').value;
  const runId=uid();
  DB.onboardingRuns.push({id:runId,employeeId:empId,trackId,type:'onboarding',status:'active',startDate});
  const newTasks=getTrackTasks(trackId).map(tt=>{
    const due=new Date(startDate);due.setDate(due.getDate()+parseInt(tt.dueDaysOffset||0));
    return{id:uid(),runId,name:tt.name,ownerRole:tt.ownerRole,status:'pending',dueDate:due.toISOString().split('T')[0]};
  });
  DB.runTasks.push(...newTasks);
  await save('onboardingRuns');await save('runTasks');
  closeModal();showToast('Onboarding run started');
  nav('onboarding');
}

let empFilterQ='',empFilterStatus='',empFilterDept='',empFilterLocation='',empFilterState='',empFilterCity='';
function filterEmps(q){empFilterQ=q;refreshEmpTable();}
function filterEmpStatus(v){empFilterStatus=v;refreshEmpTable();}
function filterEmpDept(v){empFilterDept=v;refreshEmpTable();}
function filterEmpLocation(v){empFilterLocation=v;refreshEmpTable();}
function filterEmpState(v){empFilterState=v;refreshEmpTable();}
function filterEmpCity(v){empFilterCity=v;refreshEmpTable();}
function empSortBy(col){if(empSort.col===col)empSort.dir*=-1;else{empSort.col=col;empSort.dir=1;}refreshEmpTable();}

function refreshEmpTable(){
  let list=[...DB.employees];
  if(empFilterQ){const q=empFilterQ.toLowerCase();list=list.filter(e=>e.name.toLowerCase().includes(q)||e.role.toLowerCase().includes(q)||(e.city||'').toLowerCase().includes(q)||(e.state||'').toLowerCase().includes(q)||(e.email||'').toLowerCase().includes(q));}
  if(empFilterStatus)list=list.filter(e=>e.status===empFilterStatus);
  if(empFilterDept)list=list.filter(e=>e.dept===empFilterDept);
  if(empFilterState)list=list.filter(e=>e.state===empFilterState);
  if(empFilterCity)list=list.filter(e=>e.city===empFilterCity);
  list.sort((a,b)=>(a[empSort.col]||'').localeCompare(b[empSort.col]||'')*empSort.dir);
  const tb=document.getElementById('emp-tbody');if(tb)tb.innerHTML=empRows(list);
}

function empRows(list){
  return list.map(e=>`<tr class="clickable${selectedEmpId===e.id?' selected':''}" onclick="selectEmp('${e.id}')">
    <td>${personCell(e.name,e.email)}</td><td>${e.role}</td><td>${e.dept||'—'}</td>
    <td>${statusPill(e.status)}</td><td>${e.location||e.city||'—'}</td><td>${e.phone||'—'}</td><td>${e.startDate||'—'}</td><td>${e.manager||'—'}</td><td>${e.buddy||'—'}</td>
  </tr>`).join('');
}

      <div class="detail-row"><span class="detail-key">Start Date</span><span class="detail-val">${e.startDate||'—'}</span></div>

async function confirmOffboard(empId){
  const e=DB.employees.find(x=>x.id===empId);
  const trackId=document.getElementById('off-track').value;
  const lastDay=document.getElementById('off-date').value;
  if(!trackId){showToast('No track selected');return;}
  // Update employee status and last day
  e.status='offboarding';
  e.endDate=lastDay;
  // Start offboarding run
  const runId=uid();
  DB.onboardingRuns.push({id:runId,employeeId:empId,trackId,type:'offboarding',status:'active',startDate:lastDay});
  const newTasks=getTrackTasks(trackId).map(tt=>{
    const due=new Date(lastDay);due.setDate(due.getDate()+parseInt(tt.dueDaysOffset||0));
    return{id:uid(),runId,name:tt.name,ownerRole:tt.ownerRole,status:'pending',dueDate:due.toISOString().split('T')[0]};
  });
  DB.runTasks.push(...newTasks);
  DB.activities.unshift({id:uid(),type:'offboard',desc:`${e.name} offboarding started`,at:now()});
  await save('employees');await save('onboardingRuns');await save('runTasks');await save('activities');

  selectEmp(empId);refreshEmpTable();
}

async function doDeleteEmp(id){
  DB.employees=DB.employees.filter(x=>x.id!==id);
  // Clean up device assignments — return devices to available
  DB.assignments.filter(a=>a.employeeId===id&&a.status==='active').forEach(a=>{
    const d=DB.devices.find(x=>x.id===a.deviceId);if(d){d.status='available';d.assignedTo='';}
    a.status='returned';
  });
  // Clean up onboarding runs
  const runIds=DB.onboardingRuns.filter(r=>r.employeeId===id).map(r=>r.id);
  DB.onboardingRuns=DB.onboardingRuns.filter(r=>r.employeeId!==id);
  DB.runTasks=DB.runTasks.filter(t=>!runIds.includes(t.runId));
  await save('employees');await save('assignments');await save('devices');await save('onboardingRuns');await save('runTasks');
  closeModal();closeEmpDetail();showToast('Employee deleted');renderDirectory();
}

function buildTrackCard(track,doneColor){
  var stepsHtml='';
  if(track.nextSteps.length>0){
    stepsHtml='<div style="font-size:11px;color:var(--text2);font-weight:500;margin-bottom:8px">Next steps:</div><div>'+track.nextSteps.map(function(step){return'<div style="font-size:12px;color:var(--text);padding:6px 0;border-bottom:1px solid var(--border)">'+step+'</div>';}).join('')+'</div>';
  }else{
    stepsHtml='<div style="font-size:12px;color:'+doneColor+';font-weight:500">All tasks complete</div>';
  }
  return'<div class="card" style="margin-left:52px;margin-bottom:12px;cursor:pointer" onclick="openRunDetail(\''+track.runId+'\')"><div style="font-weight:600;font-size:13px;margin-bottom:10px;color:var(--text)">'+track.trackName+' — '+track.pct+'% complete</div>'+stepsHtml+'</div>';
}
function buildGroupCard(emp,bgColor,textColor,runStatus){
  var ini=(emp.empName.match(/\b\w/g)||[]).join('');
  var _runStatus=runStatus||'active';
  // Find first matching run for click-through
  var firstRun=DB.onboardingRuns.find(function(r){return r.employeeId===emp.empId&&r.status===_runStatus;});
  var cardClick=firstRun?'openRunDetail(\''+firstRun.id+'\')':'nav(\'directory\');setTimeout(function(){selectEmp(\''+emp.empId+'\');},200)';
  // Overdue badge
  var overdueTasks=DB.runTasks.filter(function(t){
    return t.status!=='completed'&&t.dueDate&&t.dueDate<today()&&emp.tracks.some(function(tr){return tr.runId===t.runId;});
  });
  var overdueBadge=overdueTasks.length>0?'<span style="background:var(--amber-light);color:var(--amber);font-size:10px;font-weight:600;padding:2px 6px;border-radius:100px;margin-left:8px">'+overdueTasks.length+' overdue</span>':'';
  var html='<div style="margin-bottom:24px"><div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;padding:12px;background:var(--bg);border-radius:var(--radius-lg);cursor:pointer" onclick="'+cardClick+'"><div style="width:40px;height:40px;border-radius:50%;background:'+bgColor+';color:'+textColor+';display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;flex-shrink:0">'+ini+'</div><div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--text)">'+emp.empName+overdueBadge+'</div><div style="font-size:12px;color:var(--text2)">'+emp.role+'</div></div><div style="font-size:11px;color:var(--text3);align-self:center">View runs →</div></div>';
  return html;
}
function renderOnboarding(){
  const p=document.getElementById('page');
  const groups=groupOnboardingByEmployee();
  var html='<div class="page-header"><div><div class="page-title">Onboarding</div><div class="page-subtitle">'+groups.length+' active</div></div><button class="btn btn-primary" onclick="showStartRunModal(\'onboarding\')">+ Start Run</button></div>';
  if(groups.length>0){
    groups.forEach(function(emp){
      html+=buildGroupCard(emp,'var(--accent-light)','var(--accent-text)');
      emp.tracks.forEach(function(track){html+=buildTrackCard(track,'var(--green)');});
      html+='</div>';
    });
  }else{
    html+='<div style="padding:20px;text-align:center;color:var(--text3)">No active onboarding runs</div>';
  }

async function startRun(type){
  const empId=document.getElementById('run-emp').value;const trackId=document.getElementById('run-track').value;const startDate=document.getElementById('run-start').value;
  const runId=uid();
  DB.onboardingRuns.push({id:runId,employeeId:empId,trackId,type,status:'active',startDate});
  const newTasks=getTrackTasks(trackId).map(tt=>{const due=new Date(startDate);due.setDate(due.getDate()+parseInt(tt.dueDaysOffset||0));return{id:uid(),runId,name:tt.name,ownerRole:tt.ownerRole,status:'pending',dueDate:due.toISOString().split('T')[0]};});
  DB.runTasks.push(...newTasks);
  if(type==='offboarding'){
    const e=DB.employees.find(function(x){return x.id===empId;});
    if(e){e.status='offboarding';e.endDate=startDate;await save('employees');}
  }
  await save('onboardingRuns');await save('runTasks');
  closeModal();showToast('Run started');
  if(type==='offboarding')renderOffboarding();else renderOnboarding();
}

function getOverdueTasks(){
  var td=today();
  return DB.runTasks.filter(function(t){return t.status!=='completed'&&t.dueDate&&t.dueDate<td;});
}

function openRunDetail(id){
  var run=DB.onboardingRuns.find(function(r){return r.id===id;});
  var e=getEmp(run.employeeId);
  var rt=getRunTasks(id);
  var done=rt.filter(function(t){return t.status==='completed';}).length;
  var td=today();
  var taskRows='';
  rt.forEach(function(t){
    var isOverdue=(t.status!=='completed'&&t.dueDate&&t.dueDate<td);
    var dueDateHtml='<span style="color:'+(isOverdue?'var(--red)':'var(--text3)')+'">Due '+t.dueDate+(isOverdue?' <span style="background:var(--red-light);color:var(--red);font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px">Overdue</span>':'')+'</span>';
    taskRows+='<div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer" onclick="toggleRunTask(\''+run.id+'\',\''+t.id+'\')">'
      +'<div class="task-check'+(t.status==='completed'?' done':'')+'">'+( t.status==='completed'?'&#10003;':'')+'</div>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:'+(t.status==='completed'?'400':'500')+';text-decoration:'+(t.status==='completed'?'line-through':'')+';color:'+(t.status==='completed'?'var(--text3)':'var(--text)')+'">'+t.name+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">'+t.ownerRole+' &middot; '+dueDateHtml+'</div></div>'
      +statusPill(t.status)
      +'</div>';
  });
  showModal('<div class="modal" style="max-width:560px"><div class="modal-header"><div class="modal-title">'+e.name+' \u2014 '+run.type+'</div><button class="detail-close" onclick="closeModal()">\u00d7</button></div><div class="modal-body">'
    +'<p style="font-size:13px;color:var(--text2);margin-bottom:16px">Start: '+run.startDate+' &middot; '+done+'/'+rt.length+' complete</p>'
    +taskRows
    +'</div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div></div>');
}

async function toggleRunTask(runId,taskId){
  const t=DB.runTasks.find(x=>x.id===taskId);if(!t)return;
  t.status=t.status==='completed'?'pending':'completed';
  await save('runTasks');
  // Check if all tasks in this run are now complete
  const allTasks=getRunTasks(runId);
  const allDone=allTasks.length>0&&allTasks.every(t=>t.status==='completed');
  if(allDone){
    const run=DB.onboardingRuns.find(r=>r.id===runId);
    const emp=DB.employees.find(e=>e.id===run?.employeeId);
    if(emp){
      // Auto-transition onboarding → active if start date has passed
      if(run.type==='onboarding'&&emp.status==='onboarding'&&emp.startDate){
        const startDate=new Date(emp.startDate);
        const today=new Date();
        today.setHours(0,0,0,0);
        if(startDate<=today){
          // Start date has passed and all tasks done—auto-transition
          emp.status='active';
          run.status='completed';
          await save('employees');await save('onboardingRuns');
          showToast(`${emp.name} → active ✓`);
          if(currentPage==='onboarding'||currentPage==='offboarding')nav(currentPage);
          else refreshEmpTable();
          return;
        }
      }
      // Otherwise show modal (start date in future or offboarding track)
      const newStatus=run.type==='offboarding'?'inactive':'active';
      const label=run.type==='offboarding'?'mark them as inactive':'mark them as active';
      showModal(`<div class="modal"><div class="modal-header"><div class="modal-title">Track Complete!</div><button class="detail-close" onclick="closeModal()">×</button></div><div class="modal-body">
        <p style="font-size:13px;color:var(--text2);margin-bottom:16px">All tasks for <strong>${emp.name}</strong> are done. Would you like to ${label} in the Directory?</p>
      </div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Keep current status</button><button class="btn btn-primary" onclick="completeTrackStatus('${emp.id}','${newStatus}','${runId}')">Update to ${newStatus}</button></div></div>`);
    } else {
      openRunDetail(runId);
    }
  } else {
    showToast(t.status==='completed'?'Complete ✓':'Reopened');
    openRunDetail(runId);
  }
  if(currentPage==='onboarding'||currentPage==='offboarding')nav(currentPage);
}

async function completeTrackStatus(empId,newStatus,runId){
  const e=DB.employees.find(x=>x.id===empId);
  const run=DB.onboardingRuns.find(r=>r.id===runId);
  e.status=newStatus;
  if(run)run.status='completed';
  await save('employees');await save('onboardingRuns');
  closeModal();showToast(`${e.name} → ${newStatus}`);
  if(currentPage==='onboarding'||currentPage==='offboarding')nav(currentPage);
  else refreshEmpTable();
}

let offboardingShowCompleted=false;
function renderOffboarding(){
  const p=document.getElementById('page');
  const groups=groupOffboardingByEmployee();
  var completedGroups=groupOffboardingCompletedByEmployee();
  var html='<div class="page-header"><div><div class="page-title">Offboarding</div><div class="page-subtitle">'+groups.length+' active</div></div>';
  html+='<div style="display:flex;gap:8px"><button class="btn btn-secondary btn-sm'+(offboardingShowCompleted?' btn-active':'')+'" onclick="offboardingShowCompleted=!offboardingShowCompleted;renderOffboarding()">Show Completed ('+completedGroups.length+')</button><button class="btn btn-primary" onclick="showStartRunModal(\'offboarding\')">+ Start Run</button></div></div>';
  if(groups.length>0){
    groups.forEach(function(emp){
      html+=buildGroupCard(emp,'var(--red-light)','var(--red)');
      emp.tracks.forEach(function(track){html+=buildTrackCard(track,'var(--red)');});
      html+='</div>';
    });
  }else{
    html+='<div style="padding:20px;text-align:center;color:var(--text3)">No active offboarding runs</div>';
  }
  if(offboardingShowCompleted&&completedGroups.length>0){
    html+='<div style="margin-top:24px;border-top:1px solid var(--border);padding-top:16px"><div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Completed</div>';
    completedGroups.forEach(function(emp){
      html+=buildGroupCard(emp,'var(--surface2)','var(--text2)','completed');
      emp.tracks.forEach(function(track){html+=buildTrackCard(track,'var(--text3)');});
      html+='</div>';
    });
    html+='</div>';
  }
  p.innerHTML=html;
}

function groupOffboardingCompletedByEmployee(){
  const groups={};
  DB.onboardingRuns.filter(r=>r.status==='completed'&&r.type==='offboarding').forEach(run=>{
    const emp=DB.employees.find(e=>e.id===run.employeeId);
    if(!emp)return;
    if(!groups[emp.id]){groups[emp.id]={empId:emp.id,empName:emp.name,role:emp.role,endDate:emp.endDate,tracks:[]};}
    const runTasks=DB.runTasks.filter(t=>t.runId===run.id);
    const completed=runTasks.filter(t=>t.status==='completed').length;
    const track=DB.tracks.find(t=>t.id===run.trackId);
    groups[emp.id].tracks.push({runId:run.id,trackName:track?track.name:'Track',pct:runTasks.length?Math.round(completed/runTasks.length*100):0,nextSteps:[],allDone:true});
  });
  return Object.values(groups);
}

function parseDeviceDescription(text){
  if(!text||text.length<10)return;
  var t=text.toLowerCase();
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(Boolean);

  // ── Serial: may be on same line as "Serial:" or on next line ──
  var serial='';
  for(var i=0;i<lines.length;i++){
    var sm=lines[i].match(/serial\s*[:#]?\s*(.+)/i);
    if(sm){
      var val=sm[1].trim();
      if(val.length>2){serial=val;}
      else if(i+1<lines.length){serial=lines[i+1].trim();}
      break;
    }
  }
  if(serial){var sf=document.getElementById('dsr');if(sf)sf.value=serial;}

  // ── Model number: "Model:XXX" or "Model: XXX" ──
  var modelNum='';
  var mm=text.match(/model\s*[:#]\s*(\S+)/i);
  if(mm)modelNum=mm[1];

  // ── SKU: "SKU:XXX" or "SKU: XXX" ──
  var sku='';
  var skm=text.match(/sku\s*[:#]\s*(\S+)/i);
  if(skm)sku=skm[1];

  // ── Parse first line: "14-inch MacBook Pro - specs - specs - Color" ──
  var firstLine=lines[0]||'';
  var parts=firstLine.split(/\s*[-–—]\s*/);

  // Model/Name is the first segment
  var modelName=parts[0]||'';
  if(modelName){var mlf=document.getElementById('dml');if(mlf)mlf.value=modelName;}

  // Color is typically the last segment (if it's short and not a spec)
  var color='';
  if(parts.length>2){
    var lastPart=parts[parts.length-1];
    // If last part is short (< 30 chars) and doesn't contain Memory/CPU/SSD/GPU, it's a color
    if(lastPart.length<30&&!(/memory|cpu|gpu|ssd|chip/i.test(lastPart))){
      color=lastPart;
    }
  }

  // Specs are the middle segments (skip first=name, skip last if it's color)
  var specParts=parts.slice(1);
  if(color&&specParts.length>0)specParts=specParts.slice(0,-1);
  var specsStr=specParts.join(', ');
  // Append model number and SKU if found
  if(modelNum)specsStr+=(specsStr?', ':'')+'Model: '+modelNum;
  if(sku)specsStr+=(specsStr?', ':'')+'SKU: '+sku;
  if(color)specsStr+=(specsStr?', ':'')+'Color: '+color;
  if(specsStr){var spf=document.getElementById('dspecs');if(spf)spf.value=specsStr;}

  // ── Make — detect from text ──
  var makeMap={apple:'Apple',dell:'Dell',lenovo:'Lenovo',hp:'HP',microsoft:'Microsoft',samsung:'Samsung',lg:'LG',logitech:'Logitech',sony:'Sony'};
  var makeKeys=Object.keys(makeMap);
  for(var mi=0;mi<makeKeys.length;mi++){
    if(t.indexOf(makeKeys[mi])>=0){var mkf=document.getElementById('dmk');if(mkf)mkf.value=makeMap[makeKeys[mi]];break;}
  }

  // ── Type — detect from text ──
  var typeMap={laptop:'laptop',macbook:'laptop',notebook:'laptop',monitor:'monitor',display:'monitor',phone:'phone',iphone:'phone',ipad:'phone',keyboard:'keyboard',mouse:'mouse'};
  var typeKeys=Object.keys(typeMap);
  for(var ti=0;ti<typeKeys.length;ti++){
    if(t.indexOf(typeKeys[ti])>=0){var tpf=document.getElementById('dtp');if(tpf)tpf.value=typeMap[typeKeys[ti]];break;}
  }
}

function editListItem(listKey,oldVal){
  showModal('<div class="modal"><div class="modal-header"><div class="modal-title">Rename "'+oldVal+'"</div><button class="detail-close" onclick="closeModal()">\u00d7</button></div>'
    +'<div class="modal-body"><div class="form-group"><label class="form-label">New value</label><input class="form-input" id="rename-input" value="'+oldVal.replace(/"/g,'&quot;')+'"/></div></div>'
    +'<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveListItemRename(\''+listKey.replace(/'/g,"\\'")+'\',\''+oldVal.replace(/'/g,"\\'")+'\',document.getElementById(\'rename-input\').value)">Save</button></div></div>');
  setTimeout(function(){var el=document.getElementById('rename-input');if(el){el.focus();el.select();}},50);
}

async function saveListItemRename(listKey,oldVal,newVal){
  newVal=(newVal||'').trim();
  if(!newVal){showToast('Value required');return;}
  if(newVal===oldVal){closeModal();return;}
  // Update in DB.lists
  var item=DB.lists.find(function(l){return l.listKey===listKey&&l.value===oldVal;});
  if(item)item.value=newVal;
  // Update references in affected tables
  if(listKey==='candStatus'){DB.candidates.forEach(function(c){if(c.candStatus===oldVal)c.candStatus=newVal;});}
  if(listKey==='source'){DB.candidates.forEach(function(c){if(c.source===oldVal)c.source=newVal;});}
  if(listKey==='seniority'){DB.candidates.forEach(function(c){if(c.seniority===oldVal)c.seniority=newVal;});}
  if(listKey==='specialty'){DB.candidates.forEach(function(c){if(c.specialty===oldVal)c.specialty=newVal;});}
  if(listKey==='empType'){DB.candidates.forEach(function(c){if(c.empType===oldVal)c.empType=newVal;});}
  if(listKey==='dept'){DB.employees.forEach(function(e){if(e.dept===oldVal)e.dept=newVal;});}
  if(listKey==='ownerRole'){DB.tasks.forEach(function(t){if(t.ownerRole===oldVal)t.ownerRole=newVal;});}
  if(listKey==='deviceType'){DB.devices.forEach(function(d){if(d.type===oldVal)d.type=newVal;});}
  if(listKey==='interviewScore'){DB.interviews.forEach(function(iv){if(iv.score===oldVal)iv.score=newVal;});}
  // Save affected tables
  var saves=[save('lists')];
  if(listKey==='candStatus'||listKey==='source'||listKey==='seniority'||listKey==='specialty'||listKey==='empType')saves.push(save('candidates'));
  if(listKey==='dept')saves.push(save('employees'));
  if(listKey==='ownerRole')saves.push(save('tasks'));
  if(listKey==='deviceType')saves.push(save('devices'));
  if(listKey==='interviewScore')saves.push(save('interviews'));
  await Promise.all(saves);
  closeModal();showToast('"'+oldVal+'" renamed to "'+newVal+'"');
  renderDropdownsTab();
}

let dragSource=null;

function dragStartTag(e){
  dragSource=e.target.closest('.tag');
  e.dataTransfer.effectAllowed='move';
}

function dragOverTag(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
}

async function dropTag(e){
  e.preventDefault();
  if(!dragSource||dragSource===e.target.closest('.tag'))return;
  const src=dragSource;
  const dst=e.target.closest('.tag');
  if(!src||!dst)return;
  const listKey=src.dataset.list;
  const srcIdx=parseInt(src.dataset.index);
  const dstIdx=parseInt(dst.dataset.index);
  const items=getList(listKey);
  [items[srcIdx],items[dstIdx]]=[items[dstIdx],items[srcIdx]];
  items.forEach((v,i)=>{const l=DB.lists.find(x=>x.listKey===listKey&&x.value===v);if(l)l.order=String(i);});
  await save('lists');
  const tags=document.getElementById(`tags-${listKey}`);if(tags)tags.innerHTML=renderTags(listKey);
}

async function addListItem(listKey){
  const input=document.getElementById(`new-${listKey}`);const val=input.value.trim();
  if(!val){showToast('Enter a value');return;}
  if(DB.lists.find(l=>l.listKey===listKey&&l.value===val)){showToast('Already exists');return;}
  const maxOrder=DB.lists.filter(l=>l.listKey===listKey).reduce((m,l)=>Math.max(m,parseInt(l.order)||0),0);
  DB.lists.push({id:uid(),listKey,value:val,order:String(maxOrder+1)});
  await save('lists');input.value='';
  const tags=document.getElementById(`tags-${listKey}`);if(tags)tags.innerHTML=renderTags(listKey);
  showToast(`"${val}" added`);
}

    +'<div class="modal-body"><p style="font-size:13px;color:var(--text2)">Remove <strong>'+val+'</strong> from the list?</p></div>'

    +'<button class="btn btn-danger" onclick="doRemoveListItem()">Remove</button></div></div>');

async function doRemoveListItem(){
  var listKey=_pendingListRemove.key,val=_pendingListRemove.val;
  DB.lists=DB.lists.filter(function(l){return!(l.listKey===listKey&&l.value===val);});
  await save('lists');
  var tags=document.getElementById('tags-'+listKey);if(tags)tags.innerHTML=renderTags(listKey);
  closeModal();showToast('"'+val+'" removed');
}

function cpIcon(svg,color){
  return '<span class="cp-item-icon '+color+'">'+CPSVG[svg]+'</span>';
}

function openCP(){
  cp.open=true;cp.mode='list';cp.actionId=null;cp.step=1;cp.data={};cp.selIdx=0;
  document.getElementById('cp-overlay').style.display='flex';
  document.getElementById('cp-list-panel').style.display='block';
  document.getElementById('cp-step-panel').style.display='none';
  cpSearch('');
  setTimeout(function(){document.getElementById('cp-input').focus();},50);
  document.addEventListener('keydown',cpGlobalKey);
}

function closeCP(){
  cp.open=false;
  document.getElementById('cp-overlay').style.display='none';
  document.removeEventListener('keydown',cpGlobalKey);
}

function cpGlobalKey(e){
  if(e.key==='Escape')closeCP();
}

document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();if(cp.open)closeCP();else openCP();}
});

function cpGetFiltered(q){
  if(!q)return CP_ACTIONS;
  var lq=q.toLowerCase();
  return CP_ACTIONS.filter(function(a){
    return a.title.toLowerCase().indexOf(lq)>=0||a.sub.toLowerCase().indexOf(lq)>=0||a.group.toLowerCase().indexOf(lq)>=0;
  });
}

function cpSearch(q){
  cp.filtered=cpGetFiltered(q);
  cp.selIdx=0;
  cpRenderList();
}

function cpGroupItems(){
  var groups={};
  var groupOrder=[];
  cp.filtered.forEach(function(a,i){
    if(!groups[a.group]){groups[a.group]=[];groupOrder.push(a.group);}
    groups[a.group].push({action:a,idx:i});
  });
  return{groups:groups,groupOrder:groupOrder};
}

function cpRenderList(){
  var body=document.getElementById('cp-body');
  if(!cp.filtered.length){body.innerHTML='<div class="cp-empty">No actions found</div>';return;}
  var grouped=cpGroupItems();
  var html='';
  grouped.groupOrder.forEach(function(g){
    html+='<div class="cp-group-label">'+g+'</div>';
    grouped.groups[g].forEach(function(item){
      var a=item.action;
      var cls='cp-item'+(item.idx===cp.selIdx?' selected':'');
      html+='<div class="'+cls+'" onclick="cpSelectAction(\''+a.id+'\')">'+
        cpIcon(a.svg,a.color)+
        '<div class="cp-item-text">'+
        '<div class="cp-item-title">'+a.title+'</div>'+
        '<div class="cp-item-sub">'+a.sub+'</div>'+
        '</div></div>';
    });
  });
  body.innerHTML=html;
}

function cpKeyDown(e){
  if(e.key==='ArrowDown'){
    e.preventDefault();
    cp.selIdx=Math.min(cp.selIdx+1,cp.filtered.length-1);
    cpRenderList();cpScrollToSelected();
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    cp.selIdx=Math.max(cp.selIdx-1,0);
    cpRenderList();cpScrollToSelected();
  }else if(e.key==='Enter'){
    if(cp.filtered[cp.selIdx])cpSelectAction(cp.filtered[cp.selIdx].id);
  }else if(e.key==='Escape'){
    closeCP();
  }
}

function cpScrollToSelected(){
  var body=document.getElementById('cp-body');
  var sel=body.querySelector('.cp-item.selected');
  if(sel)sel.scrollIntoView({block:'nearest'});
}

function cpSelectAction(id){
  cp.actionId=id;cp.step=1;cp.data={};
  if(selectedCandId)cp.data.candId=selectedCandId;
  if(selectedEmpId)cp.data.empId=selectedEmpId;
  cp.mode='step';
  document.getElementById('cp-list-panel').style.display='none';
  var sp=document.getElementById('cp-step-panel');
  sp.style.display='flex';sp.style.flexDirection='column';
  cpRenderStep();
}

function cpBack(){
  if(cp.step>1){cp.step--;cpRenderStep();}
  else{
    cp.mode='list';
    document.getElementById('cp-list-panel').style.display='block';
    document.getElementById('cp-step-panel').style.display='none';
    document.getElementById('cp-input').focus();
  }
}

function cpCancel(){closeCP();}

async function cpNext(){
  var flow=CP_FLOWS[cp.actionId];if(!flow)return;
  flow.readStep(cp.step,cp.data);
  var total=flow.totalSteps(cp.data);
  if(cp.step<total){cp.step++;cpRenderStep();}
  else{
    try{await flow.save(cp.data);closeCP();showToast(flow.successMsg||'Saved');}
    catch(err){showToast('Error: '+err.message);console.error(err);}
  }
}

function cpRenderStep(){
  var flow=CP_FLOWS[cp.actionId];if(!flow)return;
  var total=flow.totalSteps(cp.data);
  var action=CP_ACTIONS.find(function(a){return a.id===cp.actionId;});
  document.getElementById('cp-step-header').innerHTML=
    '<button class="cp-step-back" onclick="cpBack()">'+CPSVG.back+'</button>'+
    '<div class="cp-step-title">'+(action?action.title:'')+'</div>'+
    '<div class="cp-step-progress">'+cp.step+' / '+total+'</div>';
  document.getElementById('cp-step-body').innerHTML=flow.renderStep(cp.step,cp.data)||'';
  document.getElementById('cp-next-btn').textContent=(cp.step===total)?(flow.confirmLabel||'Confirm'):'Next';
  document.getElementById('cp-back-btn').style.display=cp.step>1?'inline-flex':'none';
  setTimeout(function(){
    var first=document.getElementById('cp-step-body').querySelector('input,select,textarea');
    if(first)first.focus();
  },40);
}

      });
      DB.runTasks.push.apply(DB.runTasks,newTasks);
      await save('onboardingRuns');await save('runTasks');
    }
    await save('employees');
    if(currentPage==='directory')renderDirectory();
    if(currentPage==='offboarding')renderOffboarding();
  }

// ── GLOBAL SEARCH ─────────────────────────────────────────────────────────────
function toggleGlobalSearch(){
  var inp=document.getElementById('gs-input');
  var dd=document.getElementById('gs-dropdown');
  if(inp.classList.contains('open')){
    inp.classList.remove('open');
    if(dd)dd.classList.remove('open');
  }else{
    inp.classList.add('open');
    inp.focus();
  }
}
function closeGlobalSearch(){
  var inp=document.getElementById('gs-input');
  var dd=document.getElementById('gs-dropdown');
  if(inp){inp.classList.remove('open');inp.value='';}
  if(dd)dd.classList.remove('open');
}
function gsSearch(q){
  var dd=document.getElementById('gs-dropdown');
  if(!dd)return;
  if(!q||q.length<2){dd.classList.remove('open');return;}
  var ql=q.toLowerCase();
  var candResults=DB.candidates.filter(function(c){return c.name.toLowerCase().includes(ql)||c.role.toLowerCase().includes(ql)||(c.city||'').toLowerCase().includes(ql)||(c.state||'').toLowerCase().includes(ql);}).slice(0,5);
  var empResults=DB.employees.filter(function(e){return e.name.toLowerCase().includes(ql)||e.role.toLowerCase().includes(ql)||(e.city||'').toLowerCase().includes(ql)||(e.state||'').toLowerCase().includes(ql)||(e.email||'').toLowerCase().includes(ql);}).slice(0,5);
  var devResults=DB.devices.filter(function(d){return d.name.toLowerCase().includes(ql)||(d.serial||'').toLowerCase().includes(ql)||(d.make||'').toLowerCase().includes(ql)||(d.model||'').toLowerCase().includes(ql);}).slice(0,5);
  var html='';
  if(candResults.length){
    html+='<div class="gs-group"><div class="gs-group-label">Candidates</div>';
    candResults.forEach(function(c){html+='<div class="gs-item" onclick="closeGlobalSearch();selectCand(\''+c.id+'\');nav(\'hiring\')"><div><div class="gs-item-name">'+c.name+'</div><div class="gs-item-sub">'+c.role+(c.stage?' \u00b7 '+c.stage:'')+'</div></div></div>';});
    html+='</div>';
  }
  if(empResults.length){
    html+='<div class="gs-group"><div class="gs-group-label">Employees</div>';
    empResults.forEach(function(e){html+='<div class="gs-item" onclick="closeGlobalSearch();selectEmp(\''+e.id+'\');nav(\'directory\')"><div><div class="gs-item-name">'+e.name+'</div><div class="gs-item-sub">'+e.role+(e.dept?' \u00b7 '+e.dept:'')+'</div></div></div>';});
    html+='</div>';
  }
  if(devResults.length){
    html+='<div class="gs-group"><div class="gs-group-label">Devices</div>';
    devResults.forEach(function(d){html+='<div class="gs-item" onclick="closeGlobalSearch();nav(\'inventory\');setTimeout(function(){showDevDetail(\''+d.id+'\');},200)"><div><div class="gs-item-name">'+d.name+'</div><div class="gs-item-sub">'+(d.serial||'')+'</div></div></div>';});
    html+='</div>';
  }
  if(!html){html='<div style="padding:16px;font-size:12px;color:var(--text3);text-align:center">No results</div>';}
  dd.innerHTML=html;
  dd.classList.add('open');
}
document.addEventListener('keydown',function(e){
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'&&document.getElementById('cp-overlay').style.display!=='flex'){
    e.preventDefault();toggleGlobalSearch();
  }
});
document.addEventListener('click',function(e){
  var wrap=document.getElementById('gs-wrap');
  if(wrap&&!wrap.contains(e.target))closeGlobalSearch();
});
